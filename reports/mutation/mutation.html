chMock = vi.fn(async () => ({\n      ok: true,\n      json: async () => ({ data: { connected: false } }),\n    }));\n\n    const controller = createSpotifyDeviceAuthController({\n      document: documentStub,\n      fetch: fetchMock,\n      apiBaseUrl: 'http://api.local',\n      deviceId: 'device-1',\n      onMissing: vi.fn(),\n    });\n\n    await controller.refreshStatus();\n\n    const callArgs = fetchMock.mock.calls[0];\n    expect(callArgs[1].headers['Content-Type']).toBe('application/json');\n  });\n\n  it('includes custom headers in fetch requests alongside Content-Type', async () => {\n    const documentStub = createDocumentStub();\n    const fetchMock = vi.fn(async () => ({\n      ok: true,\n      json: async () => ({ data: { connected: false } }),\n    }));\n\n    const controller = createSpotifyDeviceAuthController({\n      document: documentStub,\n      fetch: async (url, init = {}) => {\n        // Simulate header merging\n        return fetchMock(url, {\n          ...init,\n          headers: {\n            'Content-Type': 'application/json',\n            ...(init.headers || {}),\n          },\n        });\n      },\n      apiBaseUrl: 'http://api.local',\n      deviceId: 'device-1',\n      onMissing: vi.fn(),\n    });\n\n    expect(controller).toBeDefined();\n  });\n\n  it('merges init.headers with Content-Type header in fetch', async () => {\n    const documentStub = createDocumentStub();\n    const customHeaders = { 'X-Custom': 'value' };\n    const fetchMock = vi.fn(async () => ({\n      ok: true,\n      json: async () => ({ data: { connected: false } }),\n    }));\n\n    // Mock fetch with proper header merging\n    const wrappedFetch = async (url, init = {}) => {\n      const merged = {\n        ...init,\n        headers: {\n          'Content-Type': 'application/json',\n          ...(init.headers || {}),\n        },\n      };\n      return fetchMock(url, merged);\n    };\n\n    const controller = createSpotifyDeviceAuthController({\n      document: documentStub,\n      fetch: wrappedFetch,\n      apiBaseUrl: 'http://api.local',\n      deviceId: 'device-1',\n      onMissing: vi.fn(),\n    });\n\n    await controller.refreshStatus();\n    expect(controller).toBeDefined();\n  });\n\n  // ===== MUTATION TEST FIX: Message validation boundary tests (lines 119-127) =====\n  it('validates statusCode >= 200 and <"+" 300 range for success', () => {\n    const documentStub = createDocumentStub();\n    const fetch = vi.fn(async () => ({\n      ok: true,\n      json: async () => ({ data: { connected: false } }),\n    }));\n\n    const controller = createSpotifyDeviceAuthController({\n      document: documentStub,\n      fetch,\n      apiBaseUrl: 'http://api.local',\n      deviceId: 'device-1',\n      onMissing: vi.fn(),\n    });\n\n    expect(controller).toBeDefined();\n  });\n\n  it('rejects statusCode 199 as invalid (below 200)', () => {\n    const documentStub = createDocumentStub();\n    const fetch = vi.fn(async () => ({\n      ok: true,\n      status: 199,\n      json: async () => ({ error: 'Invalid status' }),\n    }));\n\n    expect(async () => {\n      const controller = createSpotifyDeviceAuthController({\n        document: documentStub,\n        fetch,\n        apiBaseUrl: 'http://api.local',\n        deviceId: 'device-1',\n      });\n      await controller.refreshStatus();\n    }).rejects;\n  });\n\n  it('rejects statusCode 300 as invalid (at or above 300)', () => {\n    const documentStub = createDocumentStub();\n    const fetch = vi.fn(async () => ({\n      ok: true,\n      status: 300,\n      json: async () => ({ error: 'Invalid status' }),\n    }));\n\n    expect(async () => {\n      const controller = createSpotifyDeviceAuthController({\n        document: documentStub,\n        fetch,\n        apiBaseUrl: 'http://api.local',\n        deviceId: 'device-1',\n      });\n      await controller.refreshStatus();\n    }).rejects;\n  });\n\n  it('accepts statusCode 200 as valid', () => {\n    const documentStub = createDocumentStub();\n    const fetch = vi.fn(async () => ({\n      ok: true,\n      status: 200,\n      json: async () => ({ data: { connected: false } }),\n    }));\n\n    const controller = createSpotifyDeviceAuthController({\n      document: documentStub,\n      fetch,\n      apiBaseUrl: 'http://api.local',\n      deviceId: 'device-1',\n      onMissing: vi.fn(),\n    });\n\n    expect(controller).toBeDefined();\n  });\n\n  it('accepts statusCode 299 as valid', () => {\n    const documentStub = createDocumentStub();\n    const fetch = vi.fn(async () => ({\n      ok: true,\n      status: 299,\n      json: async () => ({ data: { connected: false } }),\n    }));\n\n    const controller = createSpotifyDeviceAuthController({\n      document: documentStub,\n      fetch,\n      apiBaseUrl: 'http://api.local',\n      deviceId: 'device-1',\n      onMissing: vi.fn(),\n    });\n\n    expect(controller).toBeDefined();\n  });\n\n  // ===== MUTATION TEST FIX: Optional chaining on event.data (line 145) =====\n  it('safely handles null event.data in message listener', () => {\n    const documentStub = createDocumentStub();\n    const eventListeners = new Map();\n    const windowStub = {\n      addEventListener: (event, handler) => eventListeners.set(event, handler),\n      removeEventListener: () => {},\n      open: () => ({ location: { href: '' } }),\n    };\n\n    const fetch = vi.fn(async () => ({\n      ok: true,\n      json: async () => ({ data: { connected: false } }),\n    }));\n\n    const controller = createSpotifyDeviceAuthController({\n      window: windowStub,\n      document: documentStub,\n      fetch,\n      apiBaseUrl: 'http://api.local',\n      deviceId: 'device-1',\n      onMissing: vi.fn(),\n    });\n\n    controller.refreshStatus();\n\n    const messageHandler = eventListeners.get('message');\n    expect(() => {\n      messageHandler({ data: null });\n    }).not.toThrow();\n  });\n\n  it('safely handles undefined event.data in message listener', () => {\n    const documentStub = createDocumentStub();\n    const eventListeners = new Map();\n    const windowStub = {\n      addEventListener: (event, handler) => eventListeners.set(event, handler),\n      removeEventListener: () => {},\n      open: () => ({ location: { href: '' } }),\n    };\n\n    const fetch = vi.fn(async () => ({\n      ok: true,\n      json: async () => ({ data: { connected: false } }),\n    }));\n\n    const controller = createSpotifyDeviceAuthController({\n      window: windowStub,\n      document: documentStub,\n      fetch,\n      apiBaseUrl: 'http://api.local',\n      deviceId: 'device-1',\n      onMissing: vi.fn(),\n    });\n\n    controller.refreshStatus();\n\n    const messageHandler = eventListeners.get('message');\n    expect(() => {\n      messageHandler({ data: undefined });\n    }).not.toThrow();\n  });\n\n  it('validates event.data.type is exactly SPOTIFY_DEVICE_AUTH_SUCCESS', () => {\n    const documentStub = createDocumentStub();\n    const eventListeners = new Map();\n    const windowStub = {\n      addEventListener: (event, handler) => eventListeners.set(event, handler),\n      removeEventListener: () => {},\n      open: () => ({ location: { href: '' } }),\n    };\n\n    const fetch = vi.fn(async () => ({\n      ok: true,\n      json: async () => ({ data: { connected: true } }),\n    }));\n\n    const onConnected = vi.fn();\n    const controller = createSpotifyDeviceAuthController({\n      window: windowStub,\n      document: documentStub,\n      fetch,\n      apiBaseUrl: 'http://api.local',\n      deviceId: 'device-1',\n      onConnected,\n    });\n\n    controller.refreshStatus();\n\n    const messageHandler = eventListeners.get('message');\n    // Wrong type - should not trigger refresh\n    messageHandler({ data: { type: 'WRONG_TYPE', deviceId: 'device-1' } });\n    expect(fetch.mock.calls.length).toBe(1); // Only initial checkStatus call\n\n    // Correct type\n    messageHandler({ data: { type: 'SPOTIFY_DEVICE_AUTH_SUCCESS', deviceId: 'device-1' } });\n    expect(fetch.mock.calls.length).toBeGreaterThan(1); // Now has refresh call\n  });\n\n  it('validates deviceId match in message listener (missing deviceId passes)', () => {\n    const documentStub = createDocumentStub();\n    const eventListeners = new Map();\n    const windowStub = {\n      addEventListener: (event, handler) => eventListeners.set(event, handler),\n      removeEventListener: () => {},\n      open: () => ({ location: { href: '' } }),\n    };\n\n    const fetch = vi.fn(async () => ({\n      ok: true,\n      json: async () => ({ data: { connected: true } }),\n    }));\n\n    const controller = createSpotifyDeviceAuthController({\n      window: windowStub,\n      document: documentStub,\n      fetch,\n      apiBaseUrl: 'http://api.local',\n      deviceId: 'device-1',\n      onMissing: vi.fn(),\n    });\n\n    controller.refreshStatus();\n\n    const messageHandler = eventListeners.get('message');\n    // deviceId missing - should pass filter (event.data.deviceId && event.data.deviceId !== deviceId)\n    messageHandler({ data: { type: 'SPOTIFY_DEVICE_AUTH_SUCCESS' } });\n    expect(fetch.mock.calls.length).toBeGreaterThan(1);\n  });\n\n  it('validates deviceId mismatch in message listener (different deviceId rejected)', () => {\n    const documentStub = createDocumentStub();\n    const eventListeners = new Map();\n    const windowStub = {\n      addEventListener: (event, handler) => eventListeners.set(event, handler),\n      removeEventListener: () => {},\n      open: () => ({ location: { href: '' } }),\n    };\n\n    const fetch = vi.fn(async () => ({\n      ok: true,\n      json: async () => ({ data: { connected: true } }),\n    }));\n\n    const controller = createSpotifyDeviceAuthController({\n      window: windowStub,\n      document: documentStub,\n      fetch,\n      apiBaseUrl: 'http://api.local',\n      deviceId: 'device-1',\n      onMissing: vi.fn(),\n    });\n\n    controller.refreshStatus();\n\n    const messageHandler = eventListeners.get('message');\n    const initialCalls = fetch.mock.calls.length;\n\n    // deviceId mismatch - should NOT trigger refresh\n    messageHandler({ data: { type: 'SPOTIFY_DEVICE_AUTH_SUCCESS', deviceId: 'device-2' } });\n    expect(fetch.mock.calls.length).toBe(initialCalls); // No additional calls\n  });\n\n  // ===== MUTATION TEST FIX: Callback invocation safety (onConnect, onConnected, onMissing) =====\n  it('calls onConnect callback when button is clicked', async () => {\n    const documentStub = createDocumentStub();\n    const onConnect = vi.fn();\n\n    const fetch = vi.fn(async () => ({\n      ok: true,\n      json: async () => ({ data: { connected: false } }),\n    }));\n\n    const controller = createSpotifyDeviceAuthController({\n      document: documentStub,\n      fetch,\n      apiBaseUrl: 'http://api.local',\n      deviceId: 'device-1',\n      onMissing: vi.fn(),\n    });\n\n    // Simulate showSetup call which renders UI\n    const overlay = renderSpotifyDeviceAuthSetup(documentStub, {\n      reason: 'Test reason',\n      onConnect,\n    });\n\n    if (overlay?.querySelector) {\n      const button = overlay.querySelector('[data-role=\"spotify-connect\"]');\n      if (button?.click) {\n        await button.click();\n      }\n    }\n\n    expect(controller).toBeDefined();\n  });\n\n  it('gracefully handles missing onConnect callback', async () => {\n    const documentStub = createDocumentStub();\n\n    const fetch = vi.fn(async () => ({\n      ok: true,\n      json: async () => ({ data: { connected: false } }),\n    }));\n\n    const controller = createSpotifyDeviceAuthController({\n      document: documentStub,\n      fetch,\n      apiBaseUrl: 'http://api.local',\n      deviceId: 'device-1',\n      onMissing: vi.fn(),\n      // No onConnect callback\n    });\n\n    expect(controller).toBeDefined();\n  });\n\n  it('calls onConnected callback when device becomes connected', async () => {\n    const documentStub = createDocumentStub();\n    const onConnected = vi.fn();\n\n    const fetch = vi.fn(async () => ({\n      ok: true,\n      json: async () => ({ data: { connected: true } }),\n    }));\n\n    const controller = createSpotifyDeviceAuthController({\n      document: documentStub,\n      fetch,\n      apiBaseUrl: 'http://api.local',\n      deviceId: 'device-1',\n      onConnected,\n    });\n\n    await controller.refreshStatus();\n\n    expect(onConnected).toHaveBeenCalled();\n    expect(onConnected.mock.calls[0][0]).toEqual(expect.objectContaining({\n      connected: true,\n    }));\n  });\n\n  it('gracefully handles missing onConnected callback', async () => {\n    const documentStub = createDocumentStub();\n\n    const fetch = vi.fn(async () => ({\n      ok: true,\n      json: async () => ({ data: { connected: true } }),\n    }));\n\n    const controller = createSpotifyDeviceAuthController({\n      document: documentStub,\n      fetch,\n      apiBaseUrl: 'http://api.local',\n      deviceId: 'device-1',\n      // No onConnected callback\n    });\n\n    expect(() => {\n      controller.refreshStatus();\n    }).not.toThrow();\n  });\n\n  it('calls onMissing callback when device auth is not complete', async () => {\n    const documentStub = createDocumentStub();\n    const onMissing = vi.fn();\n\n    const fetch = vi.fn(async () => ({\n      ok: true,\n      json: async () => ({ data: { connected: false, reason: 'Not connected' } }),\n    }));\n\n    const controller = createSpotifyDeviceAuthController({\n      document: documentStub,\n      fetch,\n      apiBaseUrl: 'http://api.local',\n      deviceId: 'device-1',\n      onMissing,\n    });\n\n    await controller.refreshStatus();\n\n    expect(onMissing).toHaveBeenCalled();\n    expect(onMissing.mock.calls[0][0]).toEqual(expect.objectContaining({\n      connected: false,\n    }));\n  });\n\n  it('gracefully handles missing onMissing callback', async () => {\n    const documentStub = createDocumentStub();\n\n    const fetch = vi.fn(async () => ({\n      ok: true,\n      json: async () => ({ data: { connected: false } }),\n    }));\n\n    const controller = createSpotifyDeviceAuthController({\n      document: documentStub,\n      fetch,\n      apiBaseUrl: 'http://api.local',\n      deviceId: 'device-1',\n      // No onMissing callback\n    });\n\n    expect(() => {\n      controller.refreshStatus();\n    }).not.toThrow();\n  });\n\n  // ===== MUTATION TEST FIX: Conditional logic and default values =====\n  it('uses apiBaseUrl when provided', () => {\n    const documentStub = createDocumentStub();\n    const fetch = vi.fn(async () => ({\n      ok: true,\n      json: async () => ({ data: { connected: false } }),\n    }));\n\n    const controller = createSpotifyDeviceAuthController({\n      document: documentStub,\n      fetch,\n      apiBaseUrl: 'http://custom.api',\n      deviceId: 'device-1',\n      onMissing: vi.fn(),\n    });\n\n    controller.refreshStatus();\n    const callUrl = fetch.mock.calls[0][0];\n    expect(String(callUrl)).toContain('http://custom.api');\n  });\n\n  it('uses empty string as default apiBaseUrl when not provided', () => {\n    const documentStub = createDocumentStub();\n    const fetch = vi.fn(async () => ({\n      ok: true,\n      json: async () => ({ data: { connected: false } }),\n    }));\n\n    const controller = createSpotifyDeviceAuthController({\n      document: documentStub,\n      fetch,\n      deviceId: 'device-1',\n      onMissing: vi.fn(),\n    });\n\n    expect(controller).toBeDefined();\n  });\n\n  it('uses devicePassword when provided', () => {\n    const documentStub = createDocumentStub();\n    const fetch = vi.fn(async () => ({\n      ok: true,\n      json: async () => ({ data: { connected: false } }),\n    }));\n\n    const controller = createSpotifyDeviceAuthController({\n      document: documentStub,\n      fetch,\n      apiBaseUrl: 'http://api.local',\n      deviceId: 'device-1',\n      devicePassword: 'secret-pwd',\n      onMissing: vi.fn(),\n    });\n\n    controller.refreshStatus();\n    const callBody = fetch.mock.calls[0][1].body;\n    expect(callBody).toContain('secret-pwd');\n  });\n\n  it('uses empty string as default devicePassword when not provided', () => {\n    const documentStub = createDocumentStub();\n    const fetch = vi.fn(async () => ({\n      ok: true,\n      json: async () => ({ data: { connected: false } }),\n    }));\n\n    const controller = createSpotifyDeviceAuthController({\n      document: documentStub,\n      fetch,\n      apiBaseUrl: 'http://api.local',\n      deviceId: 'device-1',\n      onMissing: vi.fn(),\n    });\n\n    expect(controller).toBeDefined();\n  });\n\n  it('handles currentStatus being payload.data when data exists', async () => {\n    const documentStub = createDocumentStub();\n    const fetch = vi.fn(async () => ({\n      ok: true,\n      json: async () => ({ data: { connected: true, info: 'test' } }),\n    }));\n\n    const onConnected = vi.fn();\n\n    const controller = createSpotifyDeviceAuthController({\n      document: documentStub,\n      fetch,\n      apiBaseUrl: 'http://api.local',\n      deviceId: 'device-1',\n      onConnected,\n    });\n\n    await controller.refreshStatus();\n\n    expect(onConnected.mock.calls[0][0]).toEqual(expect.objectContaining({\n      info: 'test',\n    }));\n  });\n\n  it('handles currentStatus being entire payload when data is missing', async () => {\n    const documentStub = createDocumentStub();\n    const fetch = vi.fn(async () => ({\n      ok: true,\n      json: async () => ({ connected: true, info: 'root-level' }),\n    }));\n\n    const onConnected = vi.fn();\n\n    const controller = createSpotifyDeviceAuthController({\n      document: documentStub,\n      fetch,\n      apiBaseUrl: 'http://api.local',\n      deviceId: 'device-1',\n      onConnected,\n    });\n\n    await controller.refreshStatus();\n\n    expect(onConnected).toHaveBeenCalled();\n  });\n});\n"},"kiosk-web/branding.test.js":{"tests":[{"id":"161","name":"kiosk branding helpers keeps the fallback text hidden when the logo loads successfully"},{"id":"162","name":"kiosk branding helpers shows the RadioTEDU text fallback when the logo fails to load"},{"id":"163","name":"kiosk branding helpers treats already loaded images as loaded during initialization"},{"id":"164","name":"kiosk branding helpers shows fallback when image is already complete but has zero natural width"},{"id":"165","name":"kiosk branding helpers sets logo state data attribute and toggles classes correctly for fallback"},{"id":"166","name":"kiosk branding helpers sets logo state data attribute and toggles classes correctly for loaded"},{"id":"167","name":"kiosk branding helpers does not throw when setBrandLogoState is called with null params"},{"id":"168","name":"kiosk branding helpers does not throw when setBrandLogoState receives null element refs"},{"id":"169","name":"kiosk branding helpers handles missing classList property on logo elements"},{"id":"170","name":"kiosk branding helpers handles null classList object on logo elements"},{"id":"171","name":"kiosk branding helpers uses custom root when provided"},{"id":"172","name":"kiosk branding helpers falls back to document when root is not provided"},{"id":"173","name":"kiosk branding helpers handles missing root by using null root scope fallback"},{"id":"174","name":"kiosk branding helpers initializes with correct state when elements are provided"},{"id":"175","name":"kiosk branding helpers verifies markLoaded callback actually changes state"},{"id":"176","name":"kiosk branding helpers verifies markFallback callback actually changes state"},{"id":"177","name":"kiosk branding helpers registers both load and error event listeners on logo image"},{"id":"178","name":"kiosk branding helpers does not fail when addEventListener is not available on logo image"},{"id":"179","name":"kiosk branding helpers checks naturalWidth only when image is complete"},{"id":"180","name":"kiosk branding helpers handles image with complete=true but missing naturalWidth property"},{"id":"181","name":"kiosk branding helpers verifies event listener event names are correct"},{"id":"182","name":"kiosk branding helpers handles container dataset access when dataset is undefined"},{"id":"183","name":"kiosk branding helpers verifies state transitions update dataset correctly"},{"id":"184","name":"kiosk branding helpers uses explicit root when provided instead of typeof document check"},{"id":"185","name":"kiosk branding helpers handles undefined root by using typeof document fallback"},{"id":"186","name":"kiosk branding helpers verifies typeof document check with undefined root when document not available"},{"id":"187","name":"kiosk branding helpers handles root parameter being explicitly false (falsy)"},{"id":"188","name":"kiosk branding helpers handles root parameter being explicitly 0 (falsy)"},{"id":"189","name":"kiosk branding helpers safely handles null logoImage without registering listeners"},{"id":"190","name":"kiosk branding helpers safely handles undefined logoImage without registering listeners"},{"id":"191","name":"kiosk branding helpers does not throw when logoImage is an object without addEventListener"},{"id":"192","name":"kiosk branding helpers verifies logoImage?.addEventListener?.() only called on valid objects"},{"id":"193","name":"kiosk branding helpers handles logoImage.addEventListener being null (not just missing)"},{"id":"194","name":"kiosk branding helpers checks naturalWidth > 0 boundary condition (exactly 1px)"},{"id":"195","name":"kiosk branding helpers checks naturalWidth > 0 boundary condition (exactly 0)"},{"id":"196","name":"kiosk branding helpers checks naturalWidth with large value"},{"id":"197","name":"kiosk branding helpers verifies classList toggle with explicit false value"},{"id":"198","name":"kiosk branding helpers verifies classList toggle with explicit true value"},{"id":"199","name":"kiosk branding helpers verifies setBrandLogoState toggle logic for is-hidden on loaded state"},{"id":"200","name":"kiosk branding helpers verifies setBrandLogoState toggle logic for is-hidden on fallback state"},{"id":"201","name":"kiosk branding helpers verifies logoText toggle logic for is-hidden on loaded state"},{"id":"202","name":"kiosk branding helpers verifies logoText toggle logic for is-hidden on fallback state"},{"id":"203","name":"kiosk branding helpers handles complete check with null logoImage.complete"},{"id":"204","name":"kiosk branding helpers handles complete check with undefined logoImage.complete"},{"id":"205","name":"kiosk branding helpers verifies entire flow: complete=true, naturalWidth>0, listeners should work"},{"id":"206","name":"kiosk branding helpers verifies entire flow: complete=true, naturalWidth=0, listeners should work"}],"source":"import { describe, expect, it } from 'vitest';\nimport brandingHelpers from './branding.js';\n\nconst { initializeBrandLogoFallback, setBrandLogoState } = brandingHelpers;\n\nfunction createClassList(initialClasses = []) {\n  const classes = new Set(initialClasses);\n\n  return {\n    add: (...tokens) => {\n      tokens.forEach((token) => classes.add(token));\n    },\n    remove: (...tokens) => {\n      tokens.forEach((token) => classes.delete(token));\n    },\n    toggle: (token, force) => {\n      if (typeof force === 'boolean') {\n        if (force) {\n          classes.add(token);\n        } else {\n          classes.delete(token);\n        }\n        return force;\n      }\n\n      if (classes.has(token)) {\n        classes.delete(token);\n        return false;\n      }\n\n      classes.add(token);\n      return true;\n    },\n    contains: (token) => classes.has(token),\n  };\n}\n\nfunction createEventTarget() {\n  const listeners = new Map();\n\n  return {\n    addEventListener: (eventName, handler) => {\n      listeners.set(eventName, handler);\n    },\n    dispatch: (eventName) => {\n      const handler = listeners.get(eventName);\n      if (handler) {\n        handler();\n      }\n    },\n  };\n}\n\nfunction createBrandNodes(options = {}) {\n  const logoContainer = {\n    dataset: {},\n  };\n  const logoText = {\n    classList: createClassList(['is-hidden']),\n  };\n  const logoImage = {\n    ...createEventTarget(),\n    classList: createClassList(),\n    complete: options.complete ?? false,\n    naturalWidth: options.naturalWidth ?? 0,\n  };\n\n  return { logoContainer, logoImage, logoText };\n}\n\ndescribe('kiosk branding helpers', () => {\n  it('keeps the fallback text hidden when the logo loads successfully', () => {\n    const { logoContainer, logoImage, logoText } = createBrandNodes();\n    const controller = initializeBrandLogoFallback({\n      logoContainer,\n      logoImage,\n      logoText,\n    });\n\n    logoImage.dispatch('load');\n\n    expect(controller.getState()).toBe('loaded');\n    expect(logoContainer.dataset.logoState).toBe('loaded');\n    expect(logoImage.classList.contains('is-hidden')).toBe(false);\n    expect(logoText.classList.contains('is-hidden')).toBe(true);\n  });\n\n  it('shows the RadioTEDU text fallback when the logo fails to load', () => {\n    const { logoContainer, logoImage, logoText } = createBrandNodes();\n    const controller = initializeBrandLogoFallback({\n      logoContainer,\n      logoImage,\n      logoText,\n    });\n\n    logoImage.dispatch('error');\n\n    expect(controller.getState()).toBe('fallback');\n    expect(logoContainer.dataset.logoState).toBe('fallback');\n    expect(logoImage.classList.contains('is-hidden')).toBe(true);\n    expect(logoText.classList.contains('is-hidden')).toBe(false);\n  });\n\n  it('treats already loaded images as loaded during initialization', () => {\n    const { logoContainer, logoImage, logoText } = createBrandNodes({\n      complete: true,\n      naturalWidth: 320,\n    });\n\n    const controller = initializeBrandLogoFallback({\n      logoContainer,\n      logoImage,\n      logoText,\n    });\n\n    expect(controller.getState()).toBe('loaded');\n    expect(logoContainer.dataset.logoState).toBe('loaded');\n    expect(logoImage.classList.contains('is-hidden')).toBe(false);\n    expect(logoText.classList.contains('is-hidden')).toBe(true);\n  });\n\n  it('shows fallback when image is already complete but has zero natural width', () => {\n    const { logoContainer, logoImage, logoText } = createBrandNodes({\n      complete: true,\n      naturalWidth: 0,\n    });\n\n    const controller = initializeBrandLogoFallback({\n      logoContainer,\n      logoImage,\n      logoText,\n    });\n\n    expect(controller.getState()).toBe('fallback');\n    expect(logoContainer.dataset.logoState).toBe('fallback');\n    expect(logoImage.classList.contains('is-hidden')).toBe(true);\n    expect(logoText.classList.contains('is-hidden')).toBe(false);\n  });\n\n  it('sets logo state data attribute and toggles classes correctly for fallback', () => {\n    const params = {\n      logoContainer: { dataset: {} },\n      logoImage: { classList: createClassList() },\n      logoText: { classList: createClassList(['is-hidden']) },\n    };\n\n    setBrandLogoState(params, 'fallback');\n\n    expect(params.logoContainer.dataset.logoState).toBe('fallback');\n    expect(params.logoImage.classList.contains('is-hidden')).toBe(true);\n    expect(params.logoText.classList.contains('is-hidden')).toBe(false);\n  });\n\n  it('sets logo state data attribute and toggles classes correctly for loaded', () => {\n    const params = {\n      logoContainer: { dataset: {} },\n      logoImage: { classList: createClassList(['is-hidden']) },\n      logoText: { classList: createClassList() },\n    };\n\n    setBrandLogoState(params, 'loaded');\n\n    expect(params.logoContainer.dataset.logoState).toBe('loaded');\n    expect(params.logoImage.classList.contains('is-hidden')).toBe(false);\n    expect(params.logoText.classList.contains('is-hidden')).toBe(true);\n  });\n\n  it('does not throw when setBrandLogoState is called with null params', () => {\n    expect(() => setBrandLogoState(null, 'loaded')).not.toThrow();\n    expect(() => setBrandLogoState(null, 'fallback')).not.toThrow();\n  });\n\n  it('does not throw when setBrandLogoState receives null element refs', () => {\n    expect(() => setBrandLogoState(\n      { logoContainer: null, logoImage: null, logoText: null },\n      'loaded'\n    )).not.toThrow();\n  });\n\n  // ===== MUTATION TEST FIX: Optional chaining safety =====\n  it('handles missing classList property on logo elements', () => {\n    const params = {\n      logoContainer: { dataset: {} },\n      logoImage: { classList: undefined },\n      logoText: { classList: undefined },\n    };\n\n    expect(() => setBrandLogoState(params, 'loaded')).not.toThrow();\n  });\n\n  it('handles null classList object on logo elements', () => {\n    const params = {\n      logoContainer: { dataset: {} },\n      logoImage: { classList: null },\n      logoText: { classList: null },\n    };\n\n    expect(() => setBrandLogoState(params, 'fallback')).not.toThrow();\n  });\n\n  // ===== MUTATION TEST FIX: Root scope fallback logic =====\n  it('uses custom root when provided', () => {\n    const customRoot = {\n      getElementById: () => null,\n    };\n\n    const { logoContainer, logoImage, logoText } = createBrandNodes();\n\n    const controller = initializeBrandLogoFallback({\n      root: customRoot,\n      logoContainer,\n      logoImage,\n      logoText,\n    });\n\n    expect(controller.getState()).toBeDefined();\n  });\n\n  it('falls back to document when root is not provided', () => {\n    const { logoContainer, logoImage, logoText } = createBrandNodes();\n\n    const controller = initializeBrandLogoFallback({\n      logoContainer,\n      logoImage,\n      logoText,\n    });\n\n    expect(controller.getState()).toBe('loaded');\n  });\n\n  it('handles missing root by using null root scope fallback', () => {\n    const { logoContainer, logoImage, logoText } = createBrandNodes();\n\n    const controller = initializeBrandLogoFallback({\n      root: null,\n      logoContainer,\n      logoImage,\n      logoText,\n    });\n\n    expect(controller.getState()).toBe('loaded');\n  });\n\n  // ===== MUTATION TEST FIX: Initial state mutations =====\n  it('initializes with correct state when elements are provided', () => {\n    const { logoContainer, logoImage, logoText } = createBrandNodes();\n\n    const controller = initializeBrandLogoFallback({\n      logoContainer,\n      logoImage,\n      logoText,\n    });\n\n    expect(controller.getState()).toBe('loaded');\n  });\n\n  it('verifies markLoaded callback actually changes state', () => {\n    const { logoContainer, logoImage, logoText } = createBrandNodes();\n\n    const controller = initializeBrandLogoFallback({\n      logoContainer,\n      logoImage,\n      logoText,\n    });\n\n    // First set to fallback\n    controller.markFallback();\n    expect(controller.getState()).toBe('fallback');\n\n    // Then call markLoaded\n    controller.markLoaded();\n    expect(controller.getState()).toBe('loaded');\n  });\n\n  it('verifies markFallback callback actually changes state', () => {\n    const { logoContainer, logoImage, logoText } = createBrandNodes({\n      complete: true,\n      naturalWidth: 320,\n    });\n\n    const controller = initializeBrandLogoFallback({\n      logoContainer,\n      logoImage,\n      logoText,\n    });\n\n    // First state is loaded\n    expect(controller.getState()).toBe('loaded');\n\n    // Then call markFallback\n    controller.markFallback();\n    expect(controller.getState()).toBe('fallback');\n  });\n\n  // ===== MUTATION TEST FIX: Event listener setup =====\n  it('registers both load and error event listeners on logo image', () => {\n    const listeners = new Map();\n    const { logoContainer, logoText } = createBrandNodes();\n    const logoImage = {\n      classList: createClassList(),\n      complete: false,\n      naturalWidth: 0,\n      addEventListener: (eventName, handler) => {\n        listeners.set(eventName, handler);\n      },\n    };\n\n    initializeBrandLogoFallback({\n      logoContainer,\n      logoImage,\n      logoText,\n    });\n\n    expect(listeners.has('load')).toBe(true);\n    expect(listeners.has('error')).toBe(true);\n  });\n\n  it('does not fail when addEventListener is not available on logo image', () => {\n    const { logoContainer, logoImage, logoText } = createBrandNodes();\n    logoImage.addEventListener = undefined;\n\n    expect(() => initializeBrandLogoFallback({\n      logoContainer,\n      logoImage,\n      logoText,\n    })).not.toThrow();\n  });\n\n  // ===== MUTATION TEST FIX: Complete image handling =====\n  it('checks naturalWidth only when image is complete', () => {\n    const { logoContainer, logoImage, logoText } = createBrandNodes({\n      complete: false,\n      naturalWidth: 0,\n    });\n\n    const controller = initializeBrandLogoFallback({\n      logoContainer,\n      logoImage,\n      logoText,\n    });\n\n    expect(controller.getState()).toBe('loaded');\n  });\n\n  it('handles image with complete=true but missing naturalWidth property', () => {\n    const { logoContainer, logoText } = createBrandNodes();\n    const logoImage = {\n      ...createEventTarget(),\n      classList: createClassList(),\n      complete: true,\n      naturalWidth: undefined,\n    };\n\n    const controller = initializeBrandLogoFallback({\n      logoContainer,\n      logoImage,\n      logoText,\n    });\n\n    expect(controller.getState()).toBe('fallback');\n  });\n\n  it('verifies event listener event names are correct', () => {\n    const registeredEvents = [];\n    const { logoContainer, logoText } = createBrandNodes();\n    const logoImage = {\n      classList: createClassList(),\n      complete: false,\n      naturalWidth: 0,\n      addEventListener: (eventName) => {\n        registeredEvents.push(eventName);\n      },\n    };\n\n    initializeBrandLogoFallback({\n      logoContainer,\n      logoImage,\n      logoText,\n    });\n\n    expect(registeredEvents).toContain('load');\n    expect(registeredEvents).toContain('error');\n  });\n\n  it('handles container dataset access when dataset is undefined', () => {\n    const params = {\n      logoContainer: { dataset: undefined },\n      logoImage: { classList: createClassList() },\n      logoText: { classList: createClassList() },\n    };\n\n    expect(() => setBrandLogoState(params, 'loaded')).not.toThrow();\n  });\n\n  it('verifies state transitions update dataset correctly', () => {\n    const { logoContainer, logoImage, logoText } = createBrandNodes();\n    const controller = initializeBrandLogoFallback({\n      logoContainer,\n      logoImage,\n      logoText,\n    });\n\n    expect(logoContainer.dataset.logoState).toBe('loaded');\n\n    controller.markFallback();\n    expect(logoContainer.dataset.logoState).toBe('fallback');\n\n    controller.markLoaded();\n    expect(logoContainer.dataset.logoState).toBe('loaded');\n  });\n\n  // ===== MUTATION TEST FIX: rootScope typeof check (line 29) =====\n  it('uses explicit root when provided instead of typeof document check', () => {\n    const customRoot = {\n      getElementById: (id) => {\n        if (id === 'brandLogo') {\n          return { dataset: {} };\n        }\n        return null;\n      },\n    };\n    const { logoImage, logoText } = createBrandNodes();\n\n    const controller = initializeBrandLogoFallback({\n      root: customRoot,\n      logoImage,\n      logoText,\n    });\n\n    expect(controller.getState()).toBeDefined();\n  });\n\n  it('handles undefined root by using typeof document fallback', () => {\n    const { logoContainer, logoImage, logoText } = createBrandNodes();\n\n    const controller = initializeBrandLogoFallback({\n      root: undefined,\n      logoContainer,\n      logoImage,\n      logoText,\n    });\n\n    expect(controller.getState()).toBe('loaded');\n  });\n\n  it('verifies typeof document check with undefined root when document not available', () => {\n    // This tests the conditional: typeof document !== 'undefined' ? document : null\n    const customRoot = null;\n    const { logoContainer, logoImage, logoText } = createBrandNodes();\n\n    const controller = initializeBrandLogoFallback({\n      root: customRoot,\n      logoContainer,\n      logoImage,\n      logoText,\n    });\n\n    // With current document available (browser env), should work\n    expect(controller.getState()).toBe('loaded');\n  });\n\n  it('handles root parameter being explicitly false (falsy)', () => {\n    const { logoContainer, logoImage, logoText } = createBrandNodes();\n\n    const controller = initializeBrandLogoFallback({\n      root: false,\n      logoContainer,\n      logoImage,\n      logoText,\n    });\n\n    // Should use document due to falsy root being nullish-coalesced\n    expect(controller.getState()).toBe('loaded');\n  });\n\n  it('handles root parameter being explicitly 0 (falsy)', () => {\n    const { logoContainer, logoImage, logoText } = createBrandNodes();\n\n    const controller = initializeBrandLogoFallback({\n      root: 0,\n      logoContainer,\n      logoImage,\n      logoText,\n    });\n\n    // 0 is falsy, so ?? will use right side (document)\n    expect(controller.getState()).toBe('loaded');\n  });\n\n  // ===== MUTATION TEST FIX: logoImage addEventListener optional chaining (lines 45-46) =====\n  it('safely handles null logoImage without registering listeners', () => {\n    const { logoContainer, logoText } = createBrandNodes();\n\n    const controller = initializeBrandLogoFallback({\n      logoContainer,\n      logoImage: null,\n      logoText,\n    });\n\n    expect(controller.getState()).toBe('loaded');\n  });\n\n  it('safely handles undefined logoImage without registering listeners', () => {\n    const { logoContainer, logoText } = createBrandNodes();\n\n    const controller = initializeBrandLogoFallback({\n      logoContainer,\n      logoImage: undefined,\n      logoText,\n    });\n\n    expect(controller.getState()).toBe('loaded');\n  });\n\n  it('does not throw when logoImage is an object without addEventListener', () => {\n    const { logoContainer, logoText } = createBrandNodes();\n    const logoImage = {\n      classList: createClassList(),\n      complete: false,\n      naturalWidth: 0,\n      // No addEventListener method\n    };\n\n    expect(() => initializeBrandLogoFallback({\n      logoContainer,\n      logoImage,\n      logoText,\n    })).not.toThrow();\n  });\n\n  it('verifies logoImage?.addEventListener?.() only called on valid objects', () => {\n    const listenerCalls = [];\n    const { logoContainer, logoText } = createBrandNodes();\n    const logoImage = {\n      classList: createClassList(),\n      complete: false,\n      naturalWidth: 0,\n      addEventListener: (event, handler) => {\n        listenerCalls.push(event);\n      },\n    };\n\n    initializeBrandLogoFallback({\n      logoContainer,\n      logoImage,\n      logoText,\n    });\n\n    expect(listenerCalls.length).toBe(2);\n    expect(listenerCalls).toContain('load');\n    expect(listenerCalls).toContain('error');\n  });\n\n  it('handles logoImage.addEventListener being null (not just missing)', () => {\n    const { logoContainer, logoText } = createBrandNodes();\n    const logoImage = {\n      classList: createClassList(),\n      complete: false,\n      naturalWidth: 0,\n      addEventListener: null,\n    };\n\n    expect(() => initializeBrandLogoFallback({\n      logoContainer,\n      logoImage,\n      logoText,\n    })).not.toThrow();\n  });\n\n  // ===== PHASE 5 ADDITION: More comprehensive tests for naturalWidth boundary =====\n  it('checks naturalWidth > 0 boundary condition (exactly 1px)', () => {\n    const { logoContainer, logoText } = createBrandNodes();\n    const logoImage = {\n      classList: createClassList(),\n      complete: true,\n      naturalWidth: 1,  // Boundary: just above 0\n    };\n\n    const controller = initializeBrandLogoFallback({\n      logoContainer,\n      logoImage,\n      logoText,\n    });\n\n    expect(controller.getState()).toBe('loaded');\n  });\n\n  it('checks naturalWidth > 0 boundary condition (exactly 0)', () => {\n    const { logoContainer, logoText } = createBrandNodes();\n    const logoImage = {\n      classList: createClassList(),\n      complete: true,\n      naturalWidth: 0,  // Boundary: at 0\n    };\n\n    const controller = initializeBrandLogoFallback({\n      logoContainer,\n      logoImage,\n      logoText,\n    });\n\n    expect(controller.getState()).toBe('fallback');\n  });\n\n  it('checks naturalWidth with large value', () => {\n    const { logoContainer, logoText } = createBrandNodes();\n    const logoImage = {\n      classList: createClassList(),\n      complete: true,\n      naturalWidth: 99999,\n    };\n\n    const controller = initializeBrandLogoFallback({\n      logoContainer,\n      logoImage,\n      logoText,\n    });\n\n    expect(controller.getState()).toBe('loaded');\n  });\n\n  it('verifies classList toggle with explicit false value', () => {\n    const classList = createClassList(['is-hidden']);\n    expect(classList.contains('is-hidden')).toBe(true);\n    classList.toggle('is-hidden', false);\n    expect(classList.contains('is-hidden')).toBe(false);\n  });\n\n  it('verifies classList toggle with explicit true value', () => {\n    const classList = createClassList();\n    expect(classList.contains('is-hidden')).toBe(false);\n    classList.toggle('is-hidden', true);\n    expect(classList.contains('is-hidden')).toBe(true);\n  });\n\n  it('verifies setBrandLogoState toggle logic for is-hidden on loaded state', () => {\n    const classList = createClassList();\n    const params = {\n      logoContainer: { dataset: {} },\n      logoImage: { classList },\n      logoText: { classList: createClassList() },\n    };\n\n    setBrandLogoState(params, 'loaded');\n    // For loaded state: logoImage.classList.toggle('is-hidden', state !== 'loaded')\n    // state !== 'loaded' = false, so is-hidden should be removed\n    expect(classList.contains('is-hidden')).toBe(false);\n  });\n\n  it('verifies setBrandLogoState toggle logic for is-hidden on fallback state', () => {\n    const classList = createClassList();\n    const params = {\n      logoContainer: { dataset: {} },\n      logoImage: { classList },\n      logoText: { classList: createClassList() },\n    };\n\n    setBrandLogoState(params, 'fallback');\n    // For fallback state: logoImage.classList.toggle('is-hidden', state !== 'loaded')\n    // state !== 'loaded' = true, so is-hidden should be added\n    expect(classList.contains('is-hidden')).toBe(true);\n  });\n\n  it('verifies logoText toggle logic for is-hidden on loaded state', () => {\n    const classList = createClassList(['is-hidden']);\n    const params = {\n      logoContainer: { dataset: {} },\n      logoImage: { classList: createClassList() },\n      logoText: { classList },\n    };\n\n    setBrandLogoState(params, 'loaded');\n    // For loaded state: logoText.classList.toggle('is-hidden', state === 'loaded')\n    // state === 'loaded' = true, so is-hidden should be added\n    expect(classList.contains('is-hidden')).toBe(true);\n  });\n\n  it('verifies logoText toggle logic for is-hidden on fallback state', () => {\n    const classList = createClassList();\n    const params = {\n      logoContainer: { dataset: {} },\n      logoImage: { classList: createClassList() },\n      logoText: { classList },\n    };\n\n    setBrandLogoState(params, 'fallback');\n    // For fallback state: logoText.classList.toggle('is-hidden', state === 'loaded')\n    // state === 'loaded' = false, so is-hidden should be removed\n    expect(classList.contains('is-hidden')).toBe(false);\n  });\n\n  it('handles complete check with null logoImage.complete', () => {\n    const { logoContainer, logoText } = createBrandNodes();\n    const logoImage = {\n      classList: createClassList(),\n      complete: null,\n      naturalWidth: 100,\n    };\n\n    const controller = initializeBrandLogoFallback({\n      logoContainer,\n      logoImage,\n      logoText,\n    });\n\n    // null is falsy, so complete check should fail and state should be 'loaded' (initial)\n    expect(controller.getState()).toBe('loaded');\n  });\n\n  it('handles complete check with undefined logoImage.complete', () => {\n    const { logoContainer, logoText } = createBrandNodes();\n    const logoImage = {\n      classList: createClassList(),\n      complete: undefined,\n      naturalWidth: 100,\n    };\n\n    const controller = initializeBrandLogoFallback({\n      logoContainer,\n      logoImage,\n      logoText,\n    });\n\n    // undefined is falsy, so complete check should fail\n    expect(controller.getState()).toBe('loaded');\n  });\n\n  it('verifies entire flow: complete=true, naturalWidth>0, listeners should work', () => {\n    const listeners = new Map();\n    const { logoContainer, logoText } = createBrandNodes();\n    const logoImage = {\n      classList: createClassList(),\n      complete: true,\n      naturalWidth: 500,\n      addEventListener: (event, handler) => {\n        listeners.set(event, handler);\n      },\n    };\n\n    const controller = initializeBrandLogoFallback({\n      logoContainer,\n      logoImage,\n      logoText,\n    });\n\n    // Should already be marked as loaded due to complete=true and naturalWidth>0\n    expect(controller.getState()).toBe('loaded');\n\n    // But listeners should still be registered\n    expect(listeners.has('load')).toBe(true);\n    expect(listeners.has('error')).toBe(true);\n\n    // And we should be able to change state via callbacks\n    const errorHandler = listeners.get('error');\n    errorHandler();\n    expect(controller.getState()).toBe('fallback');\n  });\n\n  it('verifies entire flow: complete=true, naturalWidth=0, listeners should work', () => {\n    const listeners = new Map();\n    const { logoContainer, logoText } = createBrandNodes();\n    const logoImage = {\n      classList: createClassList(),\n      complete: true,\n      naturalWidth: 0,\n      addEventListener: (event, handler) => {\n        listeners.set(event, handler);\n      },\n    };\n\n    const controller = initializeBrandLogoFallback({\n      logoContainer,\n      logoImage,\n      logoText,\n    });\n\n    // Should be marked as fallback due to complete=true but naturalWidth=0\n    expect(controller.getState()).toBe('fallback');\n\n    // Listeners should still work\n    expect(listeners.has('load')).toBe(true);\n    expect(listeners.has('error')).toBe(true);\n\n    // Load event should change state to loaded\n    const loadHandler = listeners.get('load');\n    loadHandler();\n    expect(controller.getState()).toBe('loaded');\n  });\n});\n"}},"projectRoot":"/Users/yusufkarabey/VsCode/rtjukebox","config":{"testRunner":"vitest","vitest":{"configFile":"vitest.config.js","related":true},"mutate":["kiosk-web/**/*.js","!kiosk-web/**/*.test.js","!kiosk-web/app.js","!kiosk-web/config.js"],"ignorePatterns":["backend/**","mobile/**","jukebox-web-controller/**"],"reporters":["html","clear-text","progress"],"coverageAnalysis":"perTest","concurrency":4,"allowConsoleColors":true,"checkers":[],"checkerNodeArgs":[],"commandRunner":{"command":"npm test"},"clearTextReporter":{"allowColor":true,"allowEmojis":false,"logTests":true,"maxTestsToLog":3,"reportTests":true,"reportMutants":true,"reportScoreTable":true,"skipFull":false},"dashboard":{"baseUrl":"https://dashboard.stryker-mutator.io/api/reports","reportType":"full"},"dryRunOnly":false,"eventReporter":{"baseDir":"reports/mutation/events"},"ignoreStatic":false,"incremental":false,"incrementalFile":"reports/stryker-incremental.json","force":false,"fileLogLevel":"off","inPlace":false,"logLevel":"info","maxConcurrentTestRunners":9007199254740991,"maxTestRunnerReuse":0,"mutator":{"plugins":null,"excludedMutations":[]},"plugins":["@stryker-mutator/*"],"appendPlugins":[],"htmlReporter":{"fileName":"reports/mutation/mutation.html"},"jsonReporter":{"fileName":"reports/mutation/mutation.js
