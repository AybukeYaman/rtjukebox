ew({\n      nowPlaying: null,\n      isPlaying: true,\n      spotifyTrackUri: 'spotify:track:123',\n      startupBlocked: false,\n    })).toBe(false);\n\n    expect(shouldSyncNowPlayingView({\n      nowPlaying: { song_id: 'song-spotify-1', playback_type: 'spotify' },\n      isPlaying: true,\n      spotifyTrackUri: 'spotify:track:123',\n      startupBlocked: true,\n    })).toBe(false);\n  });\n\n  it('syncs the now playing view when only spotifyTrackUri is set even if isPlaying is false', () => {\n    expect(shouldSyncNowPlayingView({\n      nowPlaying: { song_id: 'song-spotify-1', playback_type: 'spotify' },\n      isPlaying: false,\n      spotifyTrackUri: 'spotify:track:123',\n      startupBlocked: false,\n    })).toBe(true);\n  });\n\n  it('does not sync when both isPlaying and spotifyTrackUri are falsy', () => {\n    expect(shouldSyncNowPlayingView({\n      nowPlaying: { song_id: 'song-local-1', playback_type: 'local' },\n      isPlaying: false,\n      spotifyTrackUri: null,\n      startupBlocked: false,\n    })).toBe(false);\n  });\n\n  it('returns unsupported plan when spotify source type has no uri', () => {\n    const plan = getSongPlaybackPlan({\n      song_id: 'song-spotify-broken',\n      playback_type: 'spotify',\n      source_type: 'spotify',\n      spotify_uri: null,\n      file_url: null,\n    }, 'http://127.0.0.1:3000');\n\n    expect(plan).toEqual({\n      kind: 'unsupported',\n      audioUrl: null,\n      spotifyUri: null,\n      songId: 'song-spotify-broken',\n    });\n  });\n\n  it('returns unsupported plan when local source has no file_url', () => {\n    const plan = getSongPlaybackPlan({\n      song_id: 'song-local-broken',\n      playback_type: 'local',\n      source_type: 'local',\n      spotify_uri: null,\n      file_url: null,\n    }, 'http://127.0.0.1:3000');\n\n    expect(plan).toEqual({\n      kind: 'unsupported',\n      audioUrl: null,\n      spotifyUri: null,\n      songId: 'song-local-broken',\n    });\n  });\n\n  it('returns unsupported plan when file_url is an empty string', () => {\n    const plan = getSongPlaybackPlan({\n      song_id: 'song-empty',\n      source_type: 'local',\n      file_url: '',\n    }, 'http://127.0.0.1:3000');\n\n    expect(plan.kind).toBe('unsupported');\n  });\n\n  it('does not apply the current- prefix extraction when id is not a string', () => {\n    const plan = getSongPlaybackPlan({\n      id: 42,\n      source_type: 'local',\n      file_url: '/uploads/songs/song.mp3',\n    }, 'http://127.0.0.1:3000');\n\n    expect(plan.songId).toBe(42);\n  });\n\n  it('returns false from shouldSyncNowPlayingView when params is null', () => {\n    expect(shouldSyncNowPlayingView(null)).toBe(false);\n  });\n\n  it('uses file_url as-is when it does not start with a slash', () => {\n    const plan = getSongPlaybackPlan({\n      song_id: 'song-cdn',\n      source_type: 'local',\n      file_url: 'https://cdn.example.com/song.mp3',\n    }, 'http://127.0.0.1:3000');\n\n    expect(plan.kind).toBe('local');\n    expect(plan.audioUrl).toBe('https://cdn.example.com/song.mp3');\n  });\n\n  it('extracts song id from current- prefixed id when song_id is absent', () => {\n    const plan = getSongPlaybackPlan({\n      id: 'current-song-42',\n      source_type: 'local',\n      file_url: '/uploads/songs/song.mp3',\n    }, 'http://127.0.0.1:3000');\n\n    expect(plan.songId).toBe('song-42');\n  });\n\n  it('keeps spotify queue items out of unsupported-song handling in the kiosk app', async () => {\n    const appSource = fs.readFileSync(path.resolve(__dirname, './app.js'), 'utf8');\n    const fetchCalls = [];\n    const audioPlayer = {\n      pause: vi.fn(),\n      src: '',\n      addEventListener: vi.fn(),\n      play: vi.fn().mockResolvedValue(undefined),\n      currentTime: 0,\n      duration: 0,\n    };\n    const documentStub = {\n      body: { appendChild: vi.fn() },\n      documentElement: {},\n      fullscreenElement: null,\n      addEventListener: vi.fn(),\n      createElement: vi.fn(() => ( ({\n            ok: true,\n            json: () => Promise.resolve({ now_playing: null, queue: [] }),\n          });\n        }\n\n        return Promise.resolve({\n          ok: true,\n          json: () => Promise.resolve({}),\n        });\n      }),\n      CONFIG: {\n        DEVICE_CODE: 'KIOSK-1',\n        DEVICE_PWD: 'secret',\n        API_URL: 'http://127.0.0.1:3000',\n        WS_URL: 'http://127.0.0.1:3000',\n        QR_LINK_FORMAT: 'http://127.0.0.1:5173/?code={DEVICE_CODE}',\n        RECONNECT_INTERVAL: 5000,\n        UI_UPDATE_INTERVAL: 100,\n        SOCKET_EMIT_INTERVAL: 5000,\n      },\n      io: vi.fn(() => socketStub),\n      QRCode: undefined,\n      KioskPlayback: playbackHelpers,\n      KioskSpotifyPlayer: {\n        loadSpotifySdk: vi.fn().mockResolvedValue({ Player: function Player() {} }),\n        createSpotifyPlayer: vi.fn(({ onReady }) => {\n          queueMicrotask(() => onReady({\n            spotify_device_id: 'browser-device-1',\n            player_name: 'Kiosk Browser',\n            player_state: null,\n          }));\n          return spotifyController;\n        }),\n        buildSpotifyRegistrationPayload: vi.fn(({ deviceId, spotifyDeviceId, playerName, state }) => ({\n          device_id: deviceId,\n          spotify_device_id: spotifyDeviceId,\n          player_name: playerName ? String(playerName).trim() : null,\n          player_state: state,\n        })),\n        mapSpotifyPlayerState: vi.fn(),\n      },\n      Image: imageStub,\n      module: { exports: {} },\n      exports: {},\n      require,\n    });\n\n    vm.runInContext(appSource, context);\n\n    const app = new context.KioskApp();\n    await new Promise((resolve) => setTimeout(resolve, 0));\n    if (app.spotifyReadyPromise) {\n      await app.spotifyReadyPromise;\n    }\n    vi.spyOn(app, 'skipUnsupportedSong').mockResolvedValue(undefined);\n    vi.spyOn(app, 'showPlayingState').mockImplementation(() => {});\n    vi.spyOn(app, 'showIdleState').mockImplementation(() => {}) //127.0.0.1:3000',\n        WS_URL: 'http://127.0.0.1:3000',\n        QR_LINK_FORMAT: 'http://127.0.0.1:5173/?code={DEVICE_CODE}',\n        RECONNECT_INTERVAL: 5000,\n        UI_UPDATE_INTERVAL: 100,\n        SOCKET_EMIT_INTERVAL: 5000,\n      },\n      io: vi.fn(() => socketStub),\n      QRCode: undefined,\n      KioskPlayback: playbackHelpers,\n      KioskSpotifyPlayer: windowStub.KioskSpotifyPlayer,\n      Image: imageStub,\n      module: { exports: {} },\n      exports: {},\n      require,\n    });\n\n    vm.runInContext(appSource, context);\n    const app = new context.KioskApp();\n    await new Promise((resolve) => setTimeout(resolve, 0));\n\n    expect(app.spotifyDeviceAuthSetupState).toEqual(expect.objectContaining({\n      deviceId: 'device-1',\n      required: true,\n    }));\n    expect(localStorageStub.setItem).toHaveBeenCalledWith(\n      'spotify_device_auth_setup_state',\n      expect.stringContaining('\"deviceId\":\"device-1\"')\n    );\n\n    const playLocalSong = vi.spyOn(app, 'showPlayingState').mockImplementation(() => {});\n    const audioPlay = vi.spyOn(audioPlayer, 'play');\n    app.device = { id: 'device-1' };\n\n    await app.playSong({\n      id: 'queue-item-local',\n      song_id: 'song-local-1',\n      title: 'Local Song',\n      artist: 'Local Artist',\n      source_type: 'local',\n      playback_type: 'local',\n      file_url: '/uploads/songs/local-song.mp3',\n      cover_url: null,\n      added_by_name: 'Anonim',\n    });\n\n    expect(audioPlay).toHaveBeenCalled();\n    expect(playLocalSong).toHaveBeenCalled();\n  });\n\n  it('boots local kiosk services even when spotify auth is missing', async () => {\n    const appSource = fs.readFileSync(path.resolve(__dirname, './app.js'), 'utf8');\n    const audioPlayer = {\n      pause: vi.fn(),\n      src: '',\n      addEventListener: vi.fn(),\n      play: vi.fn().mockResolvedValue(undefined),\n      currentTime: 0,\n      duration: 0,\n    };\n    const socketHandlers = {};\n    const socketSt ,\n      module: { exports: {} },\n      exports: {},\n      require,\n    });\n\n    vm.runInContext(appSource, context);\n    const showStartupOverlay = vi.spyOn(context.KioskApp.prototype, 'showStartupOverlay');\n    const loadInitialQueue = vi.spyOn(context.KioskApp.prototype, 'loadInitialQueue').mockResolvedValue(undefined);\n\n    new context.KioskApp();\n    await new Promise((resolve) => setTimeout(resolve, 0));\n\n    expect(context.io).toHaveBeenCalledTimes(1);\n    expect(showStartupOverlay).toHaveBeenCalled();\n    expect(socketStub.on).toHaveBeenCalledWith('connect', expect.any(Function));\n\n    await socketHandlers.connect?.();\n    expect(loadInitialQueue).toHaveBeenCalled();\n  });\n\n  it('persists device setup credentials by redirecting with code and password query params', () => {\n    const appSource = fs.readFileSync(path.resolve(__dirname, './app.js'), 'utf8');\n    const locationStub = {\n      href: 'http://127.0.0.1:3000/kiosk/',\n      protocol: 'http:',\n      hostname: '127.0.0.1',\n      search: '',\n    };\n    const localStorageStub = {\n      getItem: vi.fn(() => null),\n      setItem: vi.fn(),\n      removeItem: vi.fn(),\n    };\n    const context = vm.createContext({\n      window: {\n        location: locationStub,\n        localStorage: localStorageStub,\n        addEventListener: vi.fn(),\n      },\n      document: {\n        addEventListener: vi.fn(),\n        getElementById: vi.fn(() => null),\n      },\n      localStorage: localStorageStub,\n      console,\n      URL,\n      setTimeout,\n      clearTimeout,\n      setInterval,\n      clearInterval,\n      module: { exports: {} },\n      exports: {},\n      require,\n    });\n\n    vm.runInContext(appSource, context);\n    const app = Object.create(context.KioskApp.prototype);\n    app.log = vi.fn();\n\n    app.persistDeviceSetupCredentials('CHILL-IN', '1234');\n\n    expect(localStorageStub.setItem).toHaveBeenCalledWith('device_code', 'CHILL-IN');\n    expect(localStorageStub.setItem).toHaveBeenCalledWith('device_pwd', '1234');\n    expect(locationStub.href).toBe('http://127.0.0.1:3000/kiosk/?code=CHILL-IN&pwd=1234');\n  });\n\n  it('shows a visible spotify connect action in the startup overlay when device auth is missing', () => {\n    const appSource = fs.readFileSync(path.resolve(__dirname, './app.js'), 'utf8');\n    const appended = [];\n    const context = vm.createContext({\n      window: {\n        location: { protocol: 'http:', hostname: '127.0.0.1', search: '' },\n        localStorage: {\n          getItem: vi.fn(() => null),\n          setItem: vi.fn(),\n          removeItem: vi.fn(),\n        },\n        addEventListener: vi.fn(),\n      },\n      document: {\n        body: {\n          appendChild: vi.fn((node) => {\n            appended.push(node);\n            return node;\n          }),\n        },\n        addEventListener: vi.fn(),\n        createElement: vi.fn((tagName) => ({\n          tagName,\n          id: '',\n          style: '',\n          innerHTML: '',\n          onclick: null,\n          remove: vi.fn(),\n          querySelector: vi.fn(() => null),\n        })),\n        getElementById: vi.fn(() => null),\n      },\n      localStorage: {\n        getItem: vi.fn(() => null),\n        setItem: vi.fn(),\n        removeItem: vi.fn(),\n      },\n      console,\n      setTimeout,\n      clearTimeout,\n      setInterval,\n      clearInterval,\n      module: { exports: {} },\n      exports: {},\n      require,\n    });\n\n    vm.runInContext(appSource, context);\n    const app = Object.create(context.KioskApp.prototype);\n    app.spotifyDeviceAuthReady = false;\n    app.openSpotifyDeviceAuthSetup = vi.fn();\n    app.log = vi.fn();\n    app.activateSpotifyPlayback = vi.fn();\n    app.checkAndPlayNext = vi.fn();\n\n    app.showStartupOverlay();\n\n    expect(appended).toHaveLength(1);\n    expect(appended[0].innerHTML).toContain('Spotify Bağla');\n  });\n\n  it('does not fall back to the device setup overlay when spoti : 'http:', hostname: '127.0.0.1', search: '' },\n      localStorage: {\n        getItem: vi.fn(() => null),\n        setItem: vi.fn(),\n        removeItem: vi.fn(),\n      },\n      addEventListener: vi.fn(),\n      Image: imageStub,\n      KioskPlayback: playbackHelpers,\n      KioskSpotifyPlayer: {\n        loadSpotifySdk: vi.fn(),\n        createSpotifyPlayer: vi.fn(),\n      },\n      KioskDeviceSpotifyAuth: {\n        createSpotifyDeviceAuthController: vi.fn(() => {\n          throw new Error('device auth helper unavailable');\n        }),\n        renderSpotifyDeviceAuthSetup: vi.fn(),\n      },\n    };\n\n    const context = vm.createContext({\n      window: windowStub,\n      document: documentStub,\n      console,\n      setTimeout,\n      clearTimeout,\n      setInterval,\n      clearInterval,\n      localStorage: windowStub.localStorage,\n      fetch,\n      io: vi.fn(() => socketStub),\n      CONFIG: {\n        DEVICE_CODE: 'KIOSK-1',\n        DEVICE_PWD: 'secret',\n        API_URL: 'http://127.0.0.1:3000',\n        WS_URL: 'http://127.0.0.1:3000',\n        QR_LINK_FORMAT: 'http://127.0.0.1:5173/?code={DEVICE_CODE}',\n        RECONNECT_INTERVAL: 5000,\n        UI_UPDATE_INTERVAL: 100,\n        SOCKET_EMIT_INTERVAL: 5000,\n      },\n      QRCode: undefined,\n      KioskPlayback: playbackHelpers,\n      KioskSpotifyPlayer: windowStub.KioskSpotifyPlayer,\n      KioskDeviceSpotifyAuth: windowStub.KioskDeviceSpotifyAuth,\n      Image: imageStub,\n      module: { exports: {} },\n      exports: {},\n      require,\n    });\n\n    vm.runInContext(appSource, context);\n    const showDeviceSetupOverlay = vi.spyOn(context.KioskApp.prototype, 'showDeviceSetupOverlay');\n    const showStartupOverlay = vi.spyOn(context.KioskApp.prototype, 'showStartupOverlay');\n\n    new context.KioskApp();\n    await new Promise((resolve) => setTimeout(resolve, 0));\n\n    expect(context.io).toHaveBeenCalledTimes(1);\n    expect(showStartupOverlay).toHaveBeenCalled();\n    expect(showDeviceSetupOverlay).not.toHaveBeenCalled();\n  });\n\n  // ===== MUTATION TEST FIX: Optional chaining in extractSongId =====\n  it('handles missing song_id property by using id as fallback', () => {\n    const plan = getSongPlaybackPlan({\n      id: 'id-only',\n      source_type: 'local',\n      file_url: '/song.mp3',\n    }, 'http://127.0.0.1:3000');\n\n    expect(plan.songId).toBe('id-only');\n  });\n\n  it('handles null song_id by trying id property', () => {\n    const plan = getSongPlaybackPlan({\n      song_id: null,\n      id: 'fallback-id',\n      source_type: 'local',\n      file_url: '/song.mp3',\n    }, 'http://127.0.0.1:3000');\n\n    expect(plan.songId).toBe('fallback-id');\n  });\n\n  it('handles undefined song_id by using id property', () => {\n    const plan = getSongPlaybackPlan({\n      song_id: undefined,\n      id: 'undefined-fallback',\n      source_type: 'local',\n      file_url: '/song.mp3',\n    }, 'http://127.0.0.1:3000');\n\n    expect(plan.songId).toBe('undefined-fallback');\n  });\n\n  // ===== MUTATION TEST FIX: String prefix detection =====\n  it('detects non-string id and does not apply current- prefix extraction', () => {\n    const plan = getSongPlaybackPlan({\n      id: 123,\n      source_type: 'local',\n      file_url: '/song.mp3',\n    }, 'http://127.0.0.1:3000');\n\n    expect(plan.songId).toBe(123);\n  });\n\n  it('extracts song id from current- prefix for string ids', () => {\n    const plan = getSongPlaybackPlan({\n      id: 'current-extracted-id-123',\n      source_type: 'local',\n      file_url: '/song.mp3',\n    }, 'http://127.0.0.1:3000');\n\n    expect(plan.songId).toBe('extracted-id-123');\n  });\n\n  it('handles current- prefix boundary correctly', () => {\n    const plan = getSongPlaybackPlan({\n      id: 'current-',\n      source_type: 'local',\n      file_url: '/song.mp3',\n    }, 'http://127.0.0.1:3000');\n\n    expect(plan.songId).toBe('');\n  });\n\n  it('does not extract current- if string does not start with current-', () => {\n    const plan = getSongPlaybackPlan({\n      id: 'notcurrent-id',\n      source_type: 'local',\n      file_url: '/song.mp3',\n    }, 'http://127.0.0.1:3000');\n\n    expect(plan.songId).toBe('notcurrent-id');\n  });\n\n  // ===== MUTATION TEST FIX: Source type fallback logic =====\n  it('uses playback_type when source_type is missing', () => {\n    const plan = getSongPlaybackPlan({\n      song_id: 'song-1',\n      playback_type: 'spotify',\n      source_type: undefined,\n      spotify_uri: 'spotify:track:123',\n    }, 'http://127.0.0.1:3000');\n\n    expect(plan.kind).toBe('spotify');\n  });\n\n  it('defaults to local when both playback_type and source_type are missing', () => {\n    const plan = getSongPlaybackPlan({\n      song_id: 'song-default',\n      file_url: '/song.mp3',\n    }, 'http://127.0.0.1:3000');\n\n    expect(plan.kind).toBe('local');\n  });\n\n  it('uses source_type when playback_type is null', () => {\n    const plan = getSongPlaybackPlan({\n      song_id: 'song-2',\n      playback_type: null,\n      source_type: 'spotify',\n      spotify_uri: 'spotify:track:456',\n    }, 'http://127.0.0.1:3000');\n\n    expect(plan.kind).toBe('spotify');\n  });\n\n  // ===== MUTATION TEST FIX: Spotify source type exact match =====\n  it('only returns spotify kind when sourceType is exactly spotify', () => {\n    const plan = getSongPlaybackPlan({\n      song_id: 'song-spotify',\n      source_type: 'Spotify',\n      spotify_uri: 'spotify:track:789',\n    }, 'http://127.0.0.1:3000');\n\n    expect(plan.kind).not.toBe('spotify');\n    expect(plan.kind).toBe('unsupported');\n  });\n\n  // ===== MUTATION TEST FIX: File URL string validation =====\n  it('validates file_url is a non-empty string before processing', () => {\n    const plan1 = getSongPlaybackPlan({\n      song_id: 'song-1',\n      source_type: 'local',\n      file_url: 0,\n    }, 'http://127.0.0.1:3000');\n\n    expect(plan1.kind).toBe('unsupported');\n\n    const plan2 = getSongPlaybackPlan({\n      song_id: 'song-2',\n      source_type: 'local',\n      file_url: false,\n    }, 'http://127.0.0.1:3000');\n\n    expect(plan2.kind).toBe('unsupported');\n  });\n\n  it('does not build local plan when file_url is empty string', () => {\n    const plan = getSongPlaybackPlan({\n      song_id: 'song-empty',\n      source_type: 'local',\n      file_url: '',\n    }, 'http://127.0.0.1:3000');\n\n    expect(plan.kind).toBe('unsupported');\n  });\n\n  // ===== MUTATION TEST FIX: Spotify URI fallback for unsupported =====\n  it('preserves spotify_uri in unsupported plan via nullish coalescing', () => {\n    const plan = getSongPlaybackPlan({\n      song_id: 'song-unsupported',\n      source_type: 'unknown',\n      spotify_uri: 'spotify:track:fallback',\n    }, 'http://127.0.0.1:3000');\n\n    expect(plan.kind).toBe('unsupported');\n    expect(plan.spotifyUri).toBe('spotify:track:fallback');\n  });\n\n  it('returns null for spotifyUri when unsupported and no spotify_uri provided', () => {\n    const plan = getSongPlaybackPlan({\n      song_id: 'song-unsupported-no-uri',\n      source_type: 'unknown',\n      spotify_uri: null,\n    }, 'http://127.0.0.1:3000');\n\n    expect(plan.kind).toBe('unsupported');\n    expect(plan.spotifyUri).toBeNull();\n  });\n\n  // ===== MUTATION TEST FIX: shouldSyncNowPlayingView conditions =====\n  it('returns false from shouldSyncNowPlayingView when startupBlocked is truthy', () => {\n    expect(shouldSyncNowPlayingView({\n      nowPlaying: { song_id: 'song-1' },\n      isPlaying: true,\n      spotifyTrackUri: 'spotify:track:123',\n      startupBlocked: true,\n    })).toBe(false);\n  });\n\n  it('returns false from shouldSyncNowPlayingView when nowPlaying is null', () => {\n    expect(shouldSyncNowPlayingView({\n      nowPlaying: null,\n      isPlaying: true,\n      spotifyTrackUri: 'spotify:track:123',\n      startupBlocked: false,\n    })).toBe(false);\n  });\n\n  it('returns false from shouldSyncNowPlayingView when nowPlaying is undefined', () => {\n    expect(shouldSyncNowPlayingView({\n      nowPlaying: undefined,\n      isPlaying: true,\n      spotifyTrackUri: 'spotify:track:123',\n      startupBlocked: false,\n    })).toBe(false);\n  });\n\n  it('returns false from shouldSyncNowPlayingView when both isPlaying and spotifyTrackUri are falsy', () => {\n    expect(shouldSyncNowPlayingView({\n      nowPlaying: { song_id: 'song-1' },\n      isPlaying: false,\n      spotifyTrackUri: null,\n      startupBlocked: false,\n    })).toBe(false);\n  });\n\n  it('returns false from shouldSyncNowPlayingView when both isPlaying and spotifyTrackUri are undefined', () => {\n    expect(shouldSyncNowPlayingView({\n      nowPlaying: { song_id: 'song-1' },\n      isPlaying: undefined,\n      spotifyTrackUri: undefined,\n      startupBlocked: false,\n    })).toBe(false);\n  });\n\n  it('returns true when isPlaying is true even if spotifyTrackUri is falsy', () => {\n    expect(shouldSyncNowPlayingView({\n      nowPlaying: { song_id: 'song-1' },\n      isPlaying: true,\n      spotifyTrackUri: null,\n      startupBlocked: false,\n    })).toBe(true);\n  });\n});\n"},"kiosk-web/spotify-player.test.js":{"tests":[{"id":"46","name":"kiosk spotify helpers verifies script element properties when loading the sdk"},{"id":"47","name":"kiosk spotify helpers calls an existing onSpotifyWebPlaybackSDKReady when the sdk loads"},{"id":"48","name":"kiosk spotify helpers resolves immediately when the spotify sdk is already loaded"},{"id":"49","name":"kiosk spotify helpers rejects and resets the load promise when the sdk script fails to load"},{"id":"50","name":"kiosk spotify helpers loads the Spotify SDK only once and resolves when the ready callback fires"},{"id":"51","name":"kiosk spotify helpers builds a normalized spotify registration payload"},{"id":"52","name":"kiosk spotify helpers maps spotify player state into a compact normalized payload"},{"id":"53","name":"kiosk spotify helpers does not mark track end when previous state has duration_ms null even if track_uri exists"},{"id":"54","name":"kiosk spotify helpers does not mark track end when same track is near end but not paused at position 0"},{"id":"55","name":"kiosk spotify helpers does not mark track end when previous position was not near the end"},{"id":"56","name":"kiosk spotify helpers maps a null state to a fully null track payload"},{"id":"57","name":"kiosk spotify helpers filters null artist entries out of track_artists"},{"id":"58","name":"kiosk spotify helpers does not mark track end when previous state has no track_uri"},{"id":"59","name":"kiosk spotify helpers marks track end when near end and next state has no current track"},{"id":"60","name":"kiosk spotify helpers marks track end when the same song resets after reaching the end"},{"id":"61","name":"kiosk spotify helpers creates a spotify player wrapper that wires sdk callbacks"},{"id":"62","name":"kiosk spotify helpers tracks last device id from the ready event via getLastDeviceId"},{"id":"63","name":"kiosk spotify helpers wrapper methods delegate to the underlying sdk player"},{"id":"64","name":"kiosk spotify helpers passes the volume option to the sdk player config"},{"id":"65","name":"kiosk spotify helpers fires error callbacks for sdk error events"},{"id":"66","name":"kiosk spotify helpers detects track end when position is within 1500ms of duration"},{"id":"67","name":"kiosk spotify helpers handles missing track_window in mapSpotifyPlayerState"},{"id":"68","name":"kiosk spotify helpers handles null current_track in track_window"},{"id":"69","name":"kiosk spotify helpers uses 0 for position_ms when state.position is not a number"},{"id":"70","name":"kiosk spotify helpers preserves duration_ms as 0 when track duration is 0"},{"id":"71","name":"kiosk spotify helpers filters out null artist names in track normalization"},{"id":"72","name":"kiosk spotify helpers handles non-array artists in track normalization"},{"id":"73","name":"kiosk spotify helpers handles missing artists property in track"},{"id":"74","name":"kiosk spotify helpers normalizes null track to empty normalized track"},{"id":"75","name":"kiosk spotify helpers trims playerName when building registration payload"},{"id":"76","name":"kiosk spotify helpers returns null for player_name when playerName is falsy"},{"id":"77","name":"kiosk spotify helpers includes player_state when state is provided"},{"id":"78","name":"kiosk spotify helpers returns null for player_state when state is not provided"},{"id":"79","name":"kiosk spotify helpers coerces playerName to string via String()"},{"id":"80","name":"kiosk spotify helpers calls onReady callback when ready event fires with payload"},{"id":"81","name":"kiosk spotify helpers handles missing onReady callback gracefully"},{"id":"82","name":"kiosk spotify helpers calls onNotReady callback when not_ready event fires"},{"id":"83","name":"kiosk spotify helpers handles missing onNotReady callback gracefully"},{"id":"84","name":"kiosk spotify helpers calls onStateChange callback when player_state_changed event fires"},{"id":"85","name":"kiosk spotify helpers handles missing onStateChange callback gracefully"},{"id":"86","name":"kiosk spotify helpers calls onAutoplayFailed callback when autoplay_failed event fires"},{"id":"87","name":"kiosk spotify helpers handles missing onAutoplayFailed callback gracefully"},{"id":"88","name":"kiosk spotify helpers calls onError callback for initialization_error event"},{"id":"89","name":"kiosk spotify helpers calls onError callback for authentication_error event"},{"id":"90","name":"kiosk spotify helpers calls onError callback for account_error event"},{"id":"91","name":"kiosk spotify helpers handles missing onError callbacks gracefully for all error types"},{"id":"92","name":"kiosk spotify helpers extracts device_id from ready payload with null coalescing"},{"id":"93","name":"kiosk spotify helpers handles payload without device_id in not_ready event"},{"id":"94","name":"kiosk spotify helpers updates lastDeviceId when ready payload contains device_id"},{"id":"95","name":"kiosk spotify helpers sets lastDeviceId to null when payload device_id is undefined"},{"id":"96","name":"kiosk spotify helpers passes correct deviceId priority (options.deviceId > payload.device_id) to onReady"},{"id":"97","name":"kiosk spotify helpers uses payload device_id when options.deviceId is not provided"},{"id":"98","name":"kiosk spotify helpers handles typeof options.volume check for player volume option"}],"source":"import { describe, expect, it, vi } from 'vitest';\nimport spotifyHelpers from './spotify-player.js';\n\nconst {\n  loadSpotifySdk,\n  createSpotifyPlayer,\n  buildSpotifyRegistrationPayload,\n  mapSpotifyPlayerState,\n} = spotifyHelpers;\n\nfunction createMockRoot() {\n  const appendedScripts = [];\n  const scriptElements = [];\n\n  const root = {\n    Spotify: undefined,\n    appendedScripts,\n    scriptElements,\n    document: {\n      head: {\n        appendChild: vi.fn((node) => {\n          appendedScripts.push(node);\n          return node;\n        }),\n      },\n      body: {\n        appendChild: vi.fn((node) => {\n          appendedScripts.push(node);\n          return node;\n        }),\n      },\n      createElement: vi.fn((tagName) => {\n        const element = {\n          tagName,\n          async: false,\n          defer: false,\n          src: '',\n          dataset: {},\n          onload: null,\n          onerror: null,\n          setAttribute(name, value) {\n            this[name] = value;\n          },\n        };\n        scriptElements.push(element);\n        return element;\n      }),\n      querySelector: vi.fn(() => null),\n      documentElement: {\n        appendChild: vi.fn((node) => {\n          appendedScripts.push(node);\n          return node;\n        }),\n      },\n    },\n  };\n\n  return root;\n}\n\ndescribe('kiosk spotify helpers', () => {\n  it('verifies script element properties when loading the sdk', () => {\n    const root = createMockRoot();\n\n    const p = loadSpotifySdk({ root, scriptUrl: 'https://sdk.scdn.co/spotify-player.js' });\n    p.catch(() => {});\n\n    const script = root.scriptElements[0];\n    expect(script.src).toBe('https://sdk.scdn.co/spotify-player.js');\n    expect(script.async).toBe(true);\n    expect(script.defer).toBe(true);\n    expect(script.dataset.spotifyWebPlaybackSdk).toBe('true');\n\n    script.onerror();\n  });\n\n  it('calls an existing onSpotifyWebPlaybackSDKReady when the sdk loads', async () => {\n    const root = createMockRoot();\n    const previousReady = vi.fn();\n    root.onSpotifyWebPlaybackSDKReady = previousReady;\n\n    const loadPromise = loadSpotifySdk({ root });\n    const script = root.scriptElements[0];\n\n    root.Spotify = { Player: vi.fn() };\n    root.onSpotifyWebPlaybackSDKReady();\n\n    await loadPromise;\n    expect(previousReady).toHaveBeenCalledTimes(1);\n\n    script.onerror();\n  });\n\n  it('resolves immediately when the spotify sdk is already loaded', async () => {\n    const root = createMockRoot();\n    root.Spotify = { Player: vi.fn() };\n\n    const result = await loadSpotifySdk({ root });\n\n    expect(result).toBe(root.Spotify);\n    expect(root.document.createElement).not.toHaveBeenCalled();\n  });\n\n  it('rejects and resets the load promise when the sdk script fails to load', async () => {\n    const root = createMockRoot();\n\n    const loadPromise = loadSpotifySdk({ root, scriptUrl: 'https://sdk.scdn.co/spotify-player.js' });\n\n    const script = root.scriptElements[0];\n    script.onerror();\n\n    await expect(loadPromise).rejects.toThrow('Failed to load Spotify Web Playback SDK');\n\n    root.Spotify = { Player: vi.fn() };\n    const retryPromise = loadSpotifySdk({ root, scriptUrl: 'https://sdk.scdn.co/spotify-player.js' });\n    expect(retryPromise).not.toBe(loadPromise);\n  });\n\n  it('loads the Spotify SDK only once and resolves when the ready callback fires', async () => {\n    const root = createMockRoot();\n\n    const firstLoad = loadSpotifySdk({ root, scriptUrl: 'https://sdk.scdn.co/spotify-player.js' });\n    const secondLoad = loadSpotifySdk({ root, scriptUrl: 'https://sdk.scdn.co/spotify-player.js' });\n\n    expect(firstLoad).toBe(secondLoad);\n    expect(root.document.createElement).toHaveBeenCalledWith('script');\n    expect(root.document.head.appendChild).toHaveBeenCalledTimes(1);\n\n    root.Spotify = { Player: vi.fn() };\n    root.onSpotifyWebPlaybackSDKReady();\n\n    await expect(firstLoad).resolves.toBe(root.Spotify);\n  });\n\n  it('builds a normalized spotify registration payload', () => {\n    const payload = buildSpotifyRegistrationPayload({\n      deviceId: 'device-1',\n      spotifyDeviceId: 'browser-device-1',\n      playerName: '  Kiosk Browser  ',\n      state: {\n        paused: false,\n        position: 45000,\n        track_window: {\n          current_track: {\n            uri: 'spotify:track:track-1',\n            id: 'track-1',\n            name: 'Track 1',\n            duration_ms: 180000,\n            artists: [{ name: 'Artist 1' }],\n          },\n        },\n      },\n    });\n\n    expect(payload).toEqual({\n      device_id: 'device-1',\n      spotify_device_id: 'browser-device-1',\n      player_name: 'Kiosk Browser',\n      player_state: {\n        paused: false,\n        position_ms: 45000,\n        duration_ms: 180000,\n        track_ended: false,\n        track_uri: 'spotify:track:track-1',\n        track_id: 'track-1',\n        track_name: 'Track 1',\n        track_artists: ['Artist 1'],\n      },\n    });\n  });\n\n  it('maps spotify player state into a compact normalized payload', () => {\n    const mapped = mapSpotifyPlayerState({\n      paused: true,\n      position: 12000,\n      track_window: {\n        current_track: {\n          uri: 'spotify:track:123',\n          id: '123',\n          name: 'Song Name',\n          duration_ms: 240000,\n          artists: [{ name: 'Artist A' }, { name: 'Artist B' }],\n        },\n      },\n    });\n\n    expect(mapped).toEqual({\n      paused: true,\n      position_ms: 12000,\n      duration_ms: 240000,\n      track_ended: false,\n      track_uri: 'spotify:track:123',\n      track_id: '123',\n      track_name: 'Song Name',\n      track_artists: ['Artist A', 'Artist B'],\n    });\n  });\n\n  it('does not mark track end when previous state has duration_ms null even if track_uri exists', () => {\n    const mapped = mapSpotifyPlayerState({\n      paused: true,\n      position: 0,\n      track_window: { current_track: null },\n    }, {\n      paused: false,\n      position_ms: 239000,\n      duration_ms: null,\n      track_ended: false,\n      track_uri: 'spotify:track:123',\n      track_id: '123',\n      track_name: 'Song',\n      track_artists: ['Artist A'],\n    });\n\n    expect(mapped.track_ended).toBe(false);\n  });\n\n  it('does not mark track end when same track is near end but not paused at position 0', () => {\n    const mapped = mapSpotifyPlayerState({\n      paused: false,\n      position: 239200,\n      track_window: {\n        current_track: {\n          uri: 'spotify:track:123',\n          id: '123',\n          name: 'Song',\n          duration_ms: 240000,\n          artists: [{ name: 'Artist A' }],\n        },\n      },\n    }, {\n      paused: false,\n      position_ms: 239000,\n      duration_ms: 240000,\n      track_ended: false,\n      track_uri: 'spotify:track:123',\n      track_id: '123',\n      track_name: 'Song',\n      track_artists: ['Artist A'],\n    });\n\n    expect(mapped.track_ended).toBe(false);\n  });\n\n  it('does not mark track end when previous position was not near the end', () => {\n    const mapped = mapSpotifyPlayerState({\n      paused: true,\n      position: 0,\n      track_window: {\n        current_track: {\n          uri: 'spotify:track:123',\n          id: '123',\n          name: 'Song Name',\n          duration_ms: 240000,\n          artists: [{ name: 'Artist A' }],\n        },\n      },\n    }, {\n      paused: false,\n      position_ms: 100000,\n      duration_ms: 240000,\n      track_ended: false,\n      track_uri: 'spotify:track:123',\n      track_id: '123',\n      track_name: 'Song Name',\n      track_artists: ['Artist A'],\n    });\n\n    expect(mapped.track_ended).toBe(false);\n  });\n\n  it('maps a null state to a fully null track payload', () => {\n    const mapped = mapSpotifyPlayerState(null);\n\n    expect(mapped).toEqual({\n      paused: false,\n      position_ms: 0,\n      duration_ms: null,\n      track_ended: false,\n      track_uri: null,\n      track_id: null,\n      track_name: null,\n      track_artists: [],\n    });\n  });\n\n  it('filters null artist entries out of track_artists', () => {\n    const mapped = mapSpotifyPlayerState({\n      paused: false,\n      position: 0,\n      track_window: {\n        current_track: {\n          uri: 'spotify:track:123',\n          id: '123',\n          name: 'Song',\n          duration_ms: 180000,\n          artists: [{ name: 'Artist A' }, null, { name: 'Artist B' }],\n        },\n      },\n    });\n\n    expect(mapped.track_artists).toEqual(['Artist A', 'Artist B']);\n  });\n\n  it('does not mark track end when previous state has no track_uri', () => {\n    const mapped = mapSpotifyPlayerState({\n      paused: true,\n      position: 0,\n      track_window: {\n        current_track: {\n          uri: 'spotify:track:123',\n          id: '123',\n          name: 'Song Name',\n          duration_ms: 240000,\n          artists: [{ name: 'Artist A' }],\n        },\n      },\n    }, {\n      paused: false,\n      position_ms: 239000,\n      duration_ms: 240000,\n      track_ended: false,\n      track_uri: null,\n      track_id: null,\n      track_name: null,\n      track_artists: [],\n    });\n\n    expect(mapped.track_ended).toBe(false);\n  });\n\n  it('marks track end when near end and next state has no current track', () => {\n    const mapped = mapSpotifyPlayerState({\n      paused: true,\n      position: 0,\n      track_window: { current_track: null },\n    }, {\n      paused: false,\n      position_ms: 239000,\n      duration_ms: 240000,\n      track_ended: false,\n      track_uri: 'spotify:track:123',\n      track_id: '123',\n      track_name: 'Song Name',\n      track_artists: ['Artist A'],\n    });\n\n    expect(mapped.track_ended).toBe(true);\n  });\n\n  it('marks track end when the same song resets after reaching the end', () => {\n    const mapped = mapSpotifyPlayerState({\n      paused: true,\n      position: 0,\n      track_window: {\n        current_track: {\n          uri: 'spotify:track:123',\n          id: '123',\n          name: 'Song Name',\n          duration_ms: 240000,\n          artists: [{ name: 'Artist A' }],\n        },\n      },\n    }, {\n      paused: false,\n      position_ms: 239500,\n      duration_ms: 240000,\n      track_ended: false,\n      track_uri: 'spotify:track:123',\n      track_id: '123',\n      track_name: 'Song Name',\n      track_artists: ['Artist A'],\n    });\n\n    expect(mapped.track_ended).toBe(true);\n  });\n\n  it('creates a spotify player wrapper that wires sdk callbacks', async () => {\n    const readyHandler = vi.fn();\n    const stateHandler = vi.fn();\n    const notReadyHandler = vi.fn();\n\n    class FakePlayer {\n      constructor(config) {\n        this.config = config;\n        this.listeners = {};\n      }\n\n      addListener(name, callback) {\n        this.listeners[name] = callback;\n      }\n\n      connect = vi.fn();\n      activateElement = vi.fn();\n      disconnect = vi.fn();\n\n      emit(name, payload) {\n        this.listeners[name]?.(payload);\n      }\n    }\n\n    const root = createMockRoot();\n    const playerInstances = [];\n    root.Spotify = {\n  Player: vi.fn(function (config) {\n    const instance = new FakePlayer(config);\n    playerInstances.push(instance);\n    this.config = instance.config;\n    this.listeners = instance.listeners;\n    this.addListener = (name, cb) => instance.addListener(name, cb);\n    this.connect = instance.connect;\n    this.activateElement = instance.activateElement;\n    this.disconnect = instance.disconnect;\n    this.emit = (name, payload) => instance.emit(name, payload);\n  }),\n};\n\n    const wrapper = createSpotifyPlayer({\n      root,\n      playerName: 'Kiosk Browser',\n      getOAuthToken: vi.fn().mockResolvedValue('token-1'),\n      onReady: readyHandler,\n      onStateChange: stateHandler,\n      onNotReady: notReadyHandler,\n    });\n\n    expect(root.Spotify.Player).toHaveBeenCalledTimes(1);\n    expect(playerInstances[0].config.name).toBe('Kiosk Browser');\n\n    const tokenCallback = vi.fn();\n    await playerInstances[0].config.getOAuthToken(tokenCallback);\n    expect(tokenCallback).toHaveBeenCalledWith('token-1');\n\n    playerInstances[0].emit('ready', { device_id: 'browser-device-1' });\n    playerInstances[0].emit('player_state_changed', {\n      paused: false,\n      position: 3000,\n      track_window: {\n        current_track: {\n          uri: 'spotify:track:abc',\n          id: 'abc',\n          name: 'Live Song',\n          duration_ms: 200000,\n          artists: [{ name: 'Artist Live' }],\n        },\n      },\n    });\n    playerInstances[0].emit('not_ready', { device_id: 'browser-device-1' });\n\n    expect(readyHandler).toHaveBeenCalledWith({\n      device_id: 'browser-device-1',\n      spotify_device_id: 'browser-device-1',\n      player_name: 'Kiosk Browser',\n      player_state: null,\n    });\n    expect(stateHandler).toHaveBeenCalledWith({\n      paused: false,\n      position_ms: 3000,\n      duration_ms: 200000,\n      track_ended: false,\n      track_uri: 'spotify:track:abc',\n      track_id: 'abc',\n      track_name: 'Live Song',\n      track_artists: ['Artist Live'],\n    });\n    expect(notReadyHandler).toHaveBeenCalledWith({\n      device_id: 'browser-device-1',\n      spotify_device_id: 'browser-device-1',\n    });\n    expect(wrapper.connect).toBeTypeOf('function');\n    expect(wrapper.activateElement).toBeTypeOf('function');\n    expect(wrapper.disconnect).toBeTypeOf('function');\n  });\n\n  it('tracks last device id from the ready event via getLastDeviceId', () => {\n    class FakePlayer {\n      constructor(config) {\n        this.config = config;\n        this.listeners = {};\n      }\n      addListener(name, callback) { this.listeners[name] = callback; }\n      connect = vi.fn();\n      activateElement = vi.fn();\n      disconnect = vi.fn();\n      emit(name, payload) { this.listeners[name]?.(payload); }\n    }\n\n    const root = createMockRoot();\n    const playerInstances = [];\n    root.Spotify = {\n      Player: vi.fn(function (config) {\n        const instance = new FakePlayer(config);\n        playerInstances.push(instance);\n        this.config = instance.config;\n        this.listeners = instance.listeners;\n        this.addListener = (name, cb) => instance.addListener(name, cb);\n        this.connect = instance.connect;\n        this.activateElement = instance.activateElement;\n        this.disconnect = instance.disconnect;\n        this.emit = (name, payload) => instance.emit(name, payload);\n      }),\n    };\n\n    const wrapper = createSpotifyPlayer({\n      root,\n      playerName: 'Kiosk Browser',\n      getOAuthToken: vi.fn().mockResolvedValue('token-1'),\n      onReady: vi.fn(),\n    });\n\n    expect(wrapper.getLastDeviceId()).toBe(null);\n\n    playerInstances[0].emit('ready', { device_id: 'device-abc' });\n\n    expect(wrapper.getLastDeviceId()).toBe('device-abc');\n  });\n\n  it('wrapper methods delegate to the underlying sdk player', async () => {\n    class FakePlayer {\n      constructor(config) {\n        this.config = config;\n        this.listeners = {};\n      }\n      addListener(name, callback) { this.listeners[name] = callback; }\n      connect = vi.fn().mockResolvedValue(true);\n      activateElement = vi.fn().mockResolvedValue(undefined);\n      disconnect = vi.fn();\n      emit(name, payload) {      // Test with undefined device_id\n      readyHandler({ });\n      expect(onReady).toHaveBeenCalledWith(expect.objectContaining({\n        spotify_device_id: '',\n      }));\n    }\n  });\n\n  it('handles payload without device_id in not_ready event', () => {\n    const onNotReady = vi.fn();\n    const mockPlayer = {\n      addListener: vi.fn(),\n      connect: vi.fn(),\n      activateElement: vi.fn(),\n      disconnect: vi.fn(),\n    };\n\n    const mockSpotify = { Player: class {} };\n    const mockRoot = { Spotify: mockSpotify };\n    \n    const addListenerCalls = [];\n    mockPlayer.addListener = vi.fn((event, handler) => {\n      addListenerCalls.push({ event, handler });\n    });\n\n    mockSpotify.Player = function() {\n      return mockPlayer;\n    };\n\n    createSpotifyPlayer({\n      root: mockRoot,\n      getOAuthToken: async () => 'test-token',\n      onNotReady,\n    });\n\n    const notReadyHandler = addListenerCalls.find(c => c.event === 'not_ready')?.handler;\n    if (notReadyHandler) {\n      notReadyHandler({ });\n      expect(onNotReady).toHaveBeenCalledWith({\n        device_id: null,\n        spotify_device_id: null,\n      });\n    }\n  });\n\n  it('updates lastDeviceId when ready payload contains device_id', () => {\n    const mockPlayer = {\n      addListener: vi.fn(),\n      connect: vi.fn(),\n      activateElement: vi.fn(),\n      disconnect: vi.fn(),\n    };\n\n    const mockSpotify = { Player: class {} };\n    const mockRoot = { Spotify: mockSpotify };\n    \n    const addListenerCalls = [];\n    mockPlayer.addListener = vi.fn((event, handler) => {\n      addListenerCalls.push({ event, handler });\n    });\n\n    mockSpotify.Player = function() {\n      return mockPlayer;\n    };\n\n    const wrapper = createSpotifyPlayer({\n      root: mockRoot,\n      getOAuthToken: async () => 'test-token',\n      onReady: vi.fn(),\n    });\n\n    const readyHandler = addListenerCalls.find(c => c.event === 'ready')?.handler;\n    if (readyHandler) {\n      readyHandler({ device_id: 'device-abc-123' });\n      expect(wrapper.getLastDeviceId()).toBe('device-abc-123');\n    }\n  });\n\n  it('sets lastDeviceId to null when payload device_id is undefined', () => {\n    const mockPlayer = {\n      addListener: vi.fn(),\n      connect: vi.fn(),\n      activateElement: vi.fn(),\n      disconnect: vi.fn(),\n    };\n\n    const mockSpotify = { Player: class {} };\n    const mockRoot = { Spotify: mockSpotify };\n    \n    const addListenerCalls = [];\n    mockPlayer.addListener = vi.fn((event, handler) => {\n      addListenerCalls.push({ event, handler });\n    });\n\n    mockSpotify.Player = function() {\n      return mockPlayer;\n    };\n\n    const wrapper = createSpotifyPlayer({\n      root: mockRoot,\n      getOAuthToken: async () => 'test-token',\n      onReady: vi.fn(),\n    });\n\n    const readyHandler = addListenerCalls.find(c => c.event === 'ready')?.handler;\n    if (readyHandler) {\n      readyHandler({ });\n      expect(wrapper.getLastDeviceId()).toBeNull();\n    }\n  });\n\n  it('passes correct deviceId priority (options.deviceId > payload.device_id) to onReady', () => {\n    const onReady = vi.fn();\n    const mockPlayer = {\n      addListener: vi.fn(),\n      connect: vi.fn(),\n      activateElement: vi.fn(),\n      disconnect: vi.fn(),\n    };\n\n    const mockSpotify = { Player: class {} };\n    const mockRoot = { Spotify: mockSpotify };\n    \n    const addListenerCalls = [];\n    mockPlayer.addListener = vi.fn((event, handler) => {\n      addListenerCalls.push({ event, handler });\n    });\n\n    mockSpotify.Player = function() {\n      return mockPlayer;\n    };\n\n    createSpotifyPlayer({\n      root: mockRoot,\n      deviceId: 'custom-device-id',\n      getOAuthToken: async () => 'test-token',\n      onReady,\n    });\n\n    const readyHandler = addListenerCalls.find(c => c.event === 'ready')?.handler;\n    if (readyHandler) {\n      readyHandler({ device_id: 'payload-device-id' });\n      expect(onReady).toHaveBeenCalledWith(expect.objectContaining({\n        device_id: 'custom-device-id',\n      }));\n    }\n  });\n\n  it('uses payload device_id when options.deviceId is not provided', () => {\n    const onReady = vi.fn();\n    const mockPlayer = {\n      addListener: vi.fn(),\n      connect: vi.fn(),\n      activateElement: vi.fn(),\n      disconnect: vi.fn(),\n    };\n\n    const mockSpotify = { Player: class {} };\n    const mockRoot = { Spotify: mockSpotify };\n    \n    const addListenerCalls = [];\n    mockPlayer.addListener = vi.fn((event, handler) => {\n      addListenerCalls.push({ event, handler });\n    });\n\n    mockSpotify.Player = function() {\n      return mockPlayer;\n    };\n\n    createSpotifyPlayer({\n      root: mockRoot,\n      getOAuthToken: async () => 'test-token',\n      onReady,\n    });\n\n    const readyHandler = addListenerCalls.find(c => c.event === 'ready')?.handler;\n    if (readyHandler) {\n      readyHandler({ device_id: 'payload-device-id' });\n      expect(onReady).toHaveBeenCalledWith(expect.objectContaining({\n        device_id: 'payload-device-id',\n      }));\n    }\n  });\n\n  it('handles typeof options.volume check for player volume option', () => {\n    const mockPlayer = {\n      addListener: vi.fn(),\n      connect: vi.fn(),\n      activateElement: vi.fn(),\n      disconnect: vi.fn(),\n    };\n\n    let constructorVolume = null;\n    const mockSpotify = {\n      Player: function(config) {\n        constructorVolume = config.volume;\n        return mockPlayer;\n      },\n    };\n    const mockRoot = { Spotify: mockSpotify };\n    \n    mockPlayer.addListener = vi.fn();\n\n    // Test with explicit volume\n    createSpotifyPlayer({\n      root: mockRoot,\n      volume: 0.5,\n      getOAuthToken: async () => 'test-token',\n    });\n\n    expect(constructorVolume).toBe(0.5);\n\n    // Test with non-number volume (should default to 1)\n    createSpotifyPlayer({\n      root: mockRoot,\n      volume: 'invalid',\n      getOAuthToken: async () => 'test-token',\n    });\n\n    expect(constructorVolume).toBe(1);\n  });\n});\n"},"kiosk-web/device-spotify-auth.test.js":{"tests":[{"id":"99","name":"kiosk device spotify auth helper builds the device specific spotify auth endpoints"},{"id":"100","name":"kiosk device spotify auth helper builds the start url with device_id and device_pwd"},{"id":"101","name":"kiosk device spotify auth helper builds the start url without device_pwd when password is empty"},{"id":"102","name":"kiosk device spotify auth helper shows a blocking setup state when device spotify auth is missing"},{"id":"103","name":"kiosk device spotify auth helper opens the device-specific spotify authorize url"},{"id":"104","name":"kiosk device spotify auth helper opens the popup synchronously before awaiting the auth url request"},{"id":"105","name":"kiosk device spotify auth helper refreshes and exits setup after a successful auth success message"},{"id":"106","name":"kiosk device spotify auth helper hides the setup state after a reconnect status refresh succeeds"},{"id":"107","name":"kiosk device spotify auth helper can render and remove the setup overlay directly"},{"id":"108","name":"kiosk device spotify auth helper ignores message events that are not SPOTIFY_DEVICE_AUTH_SUCCESS type"},{"id":"109","name":"kiosk device spotify auth helper ignores message events intended for a different device"},{"id":"110","name":"kiosk device spotify auth helper removes the message listener when destroy is called"},{"id":"111","name":"kiosk device spotify auth helper wires the connect button click handler when querySelector finds it"},{"id":"112","name":"kiosk device spotify auth helper uses body.removeChild when the overlay element has no remove method"},{"id":"113","name":"kiosk device spotify auth helper escapes html special characters in the setup overlay reason"},{"id":"114","name":"kiosk device spotify auth helper handles missing globalThis.location in buildSpotifyDeviceAuthStartUrl"},{"id":"115","name":"kiosk device spotify auth helper includes device_pwd parameter when password is provided"},{"id":"116","name":"kiosk device spotify auth helper safely handles missing getElementById method"},{"id":"117","name":"kiosk device spotify auth helper safely handles document without body.appendChild"},{"id":"118","name":"kiosk device spotify auth helper safely handles overlay.querySelector returning null"},{"id":"119","name":"kiosk device spotify auth helper handles button with onclick fallback when addEventListener is unavailable"},{"id":"120","name":"kiosk device spotify auth helper verifies that message listener is only established once"},{"id":"121","name":"kiosk device spotify auth helper does not establish message listener if window does not support addEventListener"},{"id":"122","name":"kiosk device spotify auth helper includes init.headers when provided in fetchJson"},{"id":"123","name":"kiosk device spotify auth helper merges custom headers with default Content-Type header"},{"id":"124","name":"kiosk device spotify auth helper calls onMissing callback when connected is false"},{"id":"125","name":"kiosk device spotify auth helper uses default reason message when currentStatus.reason is missing"},{"id":"126","name":"kiosk device spotify auth helper falls back to windowScope.location when popup open fails"},{"id":"127","name":"kiosk device spotify auth helper does not set location.href when both popup and location are unavailable"},{"id":"128","name":"kiosk device spotify auth helper calls popup.focus only if focus is a function"},{"id":"129","name":"kiosk device spotify auth helper validates message data.deviceId matches current deviceId"},{"id":"130","name":"kiosk device spotify auth helper ignores messages with missing data object"},{"id":"131","name":"kiosk device spotify auth helper handles fetchJson response without explicit data property"},{"id":"132","name":"kiosk device spotify auth helper does not call onConnected callback with undefined payload"},{"id":"133","name":"kiosk device spotify auth helper uses custom window when provided instead of globalThis fallback"},{"id":"134","name":"kiosk device spotify auth helper falls back to globalThis when window is not provided"},{"id":"135","name":"kiosk device spotify auth helper verifies typeof globalThis check for window scope fallback"},{"id":"136","name":"kiosk device spotify auth helper includes Content-Type header in fetch requests"},{"id":"137","name":"kiosk device spotify auth helper includes custom headers in fetch requests alongside Content-Type"},{"id":"138","name":"kiosk device spotify auth helper merges init.headers with Content-Type header in fetch"},{"id":"139","name":"kiosk device spotify auth helper validates statusCode >= 200 and <"+" 300 range for success"},{"id":"140","name":"kiosk device spotify auth helper rejects statusCode 199 as invalid (below 200)"},{"id":"141","name":"kiosk device spotify auth helper rejects statusCode 300 as invalid (at or above 300)"},{"id":"142","name":"kiosk device spotify auth helper accepts statusCode 200 as valid"},{"id":"143","name":"kiosk device spotify auth helper accepts statusCode 299 as valid"},{"id":"144","name":"kiosk device spotify auth helper safely handles null event.data in message listener"},{"id":"145","name":"kiosk device spotify auth helper safely handles undefined event.data in message listener"},{"id":"146","name":"kiosk device spotify auth helper validates event.data.type is exactly SPOTIFY_DEVICE_AUTH_SUCCESS"},{"id":"147","name":"kiosk device spotify auth helper validates deviceId match in message listener (missing deviceId passes)"},{"id":"148","name":"kiosk device spotify auth helper validates deviceId mismatch in message listener (different deviceId rejected)"},{"id":"149","name":"kiosk device spotify auth helper calls onConnect callback when button is clicked"},{"id":"150","name":"kiosk device spotify auth helper gracefully handles missing onConnect callback"},{"id":"151","name":"kiosk device spotify auth helper calls onConnected callback when device becomes connected"},{"id":"152","name":"kiosk device spotify auth helper gracefully handles missing onConnected callback"},{"id":"153","name":"kiosk device spotify auth helper calls onMissing callback when device auth is not complete"},{"id":"154","name":"kiosk device spotify auth helper gracefully handles missing onMissing callback"},{"id":"155","name":"kiosk device spotify auth helper uses apiBaseUrl when provided"},{"id":"156","name":"kiosk device spotify auth helper uses empty string as default apiBaseUrl when not provided"},{"id":"157","name":"kiosk device spotify auth helper uses devicePassword when provided"},{"id":"158","name":"kiosk device spotify auth helper uses empty string as default devicePassword when not provided"},{"id":"159","name":"kiosk device spotify auth helper handles currentStatus being payload.data when data exists"},{"id":"160","name":"kiosk device spotify auth helper handles currentStatus being entire payload when data is missing"}],"source":"import { beforeEach, describe, expect, it, vi } from 'vitest';\nimport {\n  buildSpotifyDeviceAuthEndpoints,\n  buildSpotifyDeviceAuthStartUrl,\n  createSpotifyDeviceAuthController,\n  renderSpotifyDeviceAuthSetup,\n  removeSpotifyDeviceAuthSetup,\n} from './device-spotify-auth.js';\n\nfunction createDocumentStub() {\n  const nodes = new Map();\n  const appended = [];\n\n  const body = {\n    appendChild(node) {\n      appended.push(node);\n      if (node?.id) {\n        nodes.set(node.id, node);\n      }\n      return node;\n    },\n    removeChild(node) {\n      const index = appended.indexOf(node);\n      if (index >= 0) {\n        appended.splice(index, 1);\n      }\n      if (node?.id) {\n        nodes.delete(node.id);\n      }\n      return node;\n    },\n  };\n\n  return {\n    body,\n    appended,\n    nodes,\n    createElement(tagName) {\n      return {\n        tagName,\n        id: '',\n        className: '',\n        style: {},\n        innerHTML: '',\n        textContent: '',\n        dataset: {},\n        remove() {\n          body.removeChild(this);\n        },\n        querySelector() {\n          return null;\n        },\n      };\n    },\n    getElementById(id) {\n      return nodes.get(id) || null;\n    },\n  };\n}\n\ndescribe('kiosk device spotify auth helper', () => {\n  beforeEach(() => {\n    vi.restoreAllMocks();\n  });\n\n  it('builds the device specific spotify auth endpoints', () => {\n    expect(buildSpotifyDeviceAuthEndpoints('http://127.0.0.1:3000')).toEqual({\n      status: 'http://127.0.0.1:3000/api/v1/jukebox/kiosk/spotify-device-auth/status',\n      start: 'http://127.0.0.1:3000/api/v1/jukebox/kiosk/spotify-device-auth/start',\n    });\n  });\n\n  it('builds the start url with device_id and device_pwd', () => {\n    const url = buildSpotifyDeviceAuthStartUrl('http://127.0.0.1:3000', 'device-1', 'secret');\n    expect(url).toBe('http://127.0.0.1:3000/api/v1/jukebox/kiosk/spotify-device-auth/start?device_id=device-1&device_pwd=secret');\n  });\n\n  it('builds the start url without device_pwd when password is empty', () => {\n    const url = buildSpotifyDeviceAuthStartUrl('http://127.0.0.1:3000', 'device-1', '');\n    expect(url).not.toContain('device_pwd');\n    expect(url).toContain('device_id=device-1');\n  });\n\n  it('shows a blocking setup state when device spotify auth is missing', async () => {\n    const documentStub = createDocumentStub();\n    const fetch = vi.fn(async (url) => {\n      expect(String(url)).toContain('/api/v1/jukebox/kiosk/spotify-device-auth/status');\n      return {\n        ok: true,\n        json: async () => ({\n          success: true,\n          data: {\n            deviceId: 'device-1',\n            connected: false,\n            spotifyAccountId: null,\n            spotifyDisplayName: null,\n            spotifyEmail: null,\n            spotifyProduct: null,\n            spotifyCountry: null,\n            tokenExpiresAt: null,\n            scopes: null,\n            hasRefreshToken: false,\n          },\n        }),\n      };\n    });\n\n    const controller = createSpotifyDeviceAuthController({\n      apiBaseUrl: 'http://127.0.0.1:3000',\n      deviceId: 'device-1',\n      devicePassword: 'secret',\n      document: documentStub,\n      fetch,\n      window: {\n        open: vi.fn(),\n        addEventListener: vi.fn(),\n        removeEventListener: vi.fn(),\n        localStorage: {\n          getItem: vi.fn(),\n          setItem: vi.fn(),\n          removeItem: vi.fn(),\n        },\n      },\n    });\n\n    await controller.refreshStatus();\n\n    const overlay = documentStub.getElementById('spotifyDeviceAuthSetupOverlay');\n    expect(overlay).not.toBeNull();\n    expect(overlay.innerHTML).toContain('Spotify bağlantısı gerekli');\n    expect(overlay.innerHTML).toContain('Bağlan');\n  });\n\n  it('opens the device-specific spotify authorize url', async () => {\n    const documentStub = createDocumentStub();\n    const popup = {\n      location: { href: '' },\n      focus: vi.fn(),\n      close: vi.fn(),\n    };\n    const open = vi.fn(() => popup);\n    const fetch = vi.fn();\n\n    const controller = createSpotifyDeviceAuthController({\n      apiBaseUrl: 'http://127.0.0.1:3000',\n      deviceId: 'device-1',\n      devicePassword: 'secret',\n      document: documentStub,\n      fetch,\n      window: {\n        open,\n        addEventListener: vi.fn(),\n        removeEventListener: vi.fn(),\n        localStorage: {\n          getItem: vi.fn(),\n          setItem: vi.fn(),\n          removeItem: vi.fn(),\n        },\n      },\n    });\n\n    await controller.openConnectFlow();\n\n    expect(open).toHaveBeenCalledWith('', '_blank');\n    expect(fetch).not.toHaveBeenCalled();\n    expect(popup.location.href).toBe('http://127.0.0.1:3000/api/v1/jukebox/kiosk/spotify-device-auth/start?device_id=device-1&device_pwd=secret');\n    expect(popup.focus).toHaveBeenCalledTimes(1);\n  });\n\n  it('opens the popup synchronously before awaiting the auth url request', async () => {\n    const documentStub = createDocumentStub();\n    const popup = {\n      location: { href: '' },\n      focus: vi.fn(),\n      close: vi.fn(),\n    };\n    const open = vi.fn(() => popup);\n\n    const fetch = vi.fn();\n\n    const controller = createSpotifyDeviceAuthController({\n      apiBaseUrl: 'http://127.0.0.1:3000',\n      deviceId: 'device-1',\n      devicePassword: 'secret',\n      document: documentStub,\n      fetch,\n      window: {\n        open,\n        addEventListener: vi.fn(),\n        removeEventListener: vi.fn(),\n        localStorage: {\n          getItem: vi.fn(),\n          setItem: vi.fn(),\n          removeItem: vi.fn(),\n        },\n      },\n    });\n\n    await controller.openConnectFlow();\n\n    expect(open).toHaveBeenCalledWith('', '_blank');\n    expect(fetch).not.toHaveBeenCalled();\n    expect(popup.location.href).toBe('http://127.0.0.1:3000/api/v1/jukebox/kiosk/spotify-device-auth/start?device_id=device-1&device_pwd=secret');\n  });\n\n  it('refreshes and exits setup after a successful auth success message', async () => {\n    const documentStub = createDocumentStub();\n    let connected = false;\n    let messageHandler = null;\n    const popup = {\n      location: { href: '' },\n      focus: vi.fn(),\n      close: vi.fn(),\n    };\n    const open = vi.fn(() => popup);\n    const addEventListener = vi.fn((eventName, handler) => {\n      if (eventName === 'message') {\n        messageHandler = handler;\n      }\n    });\n    const fetch = vi.fn(async (url) => {\n      const urlString = String(url);\n      if (urlString.includes('/status')) {\n        return {\n          ok: true,\n          json: async () => ({\n            success: true,\n            data: {\n              deviceId: 'device-1',\n              connected,\n              spotifyAccountId: connected ? 'spotify-1' : null,\n              spotifyDisplayName: connected ? 'Kiosk Device' : n
